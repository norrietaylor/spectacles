# Declared classification of the `sdd:*` and hand-off labels for the
# lifecycle state-machine validator (scripts/test-lifecycle-state-machine.py).
#
# The validator reads this file as the source of truth for:
#   - which labels are lifecycle states (mutually exclusive on the
#     tracking issue), versus marker labels (orthogonal, may coexist
#     with a lifecycle label);
#   - the directed transition graph between lifecycle states;
#   - the one workflow that is allowed to write each lifecycle label.
#
# It then cross-checks this declaration against three sources:
#   - the label catalogue at `templates/.github/labels.yml`,
#   - the prose contract in the `.github/workflows/sdd-*.md` sources
#     (the `Remove the \`sdd:X\` label` / `Add the \`sdd:Y\` label`
#     phrasing inside each `### N. ...` step block), and
#   - each workflow's `safe-outputs.add-labels.allowed` frontmatter.
#
# Adding a new lifecycle state requires three coordinated edits: this
# file, the label catalogue, and the prose of whichever workflow writes
# the transition. The validator's job is to make any one of those
# without the others a PR-time failure with a diagnostic that names the
# missing piece.

# Lifecycle states. Exactly one is present on a tracking issue at a
# time. The order here is presentation-only; the directed graph below
# is the actual ordering authority. The fast-path branch (sdd:fastpath,
# sdd:fastpath-review) is the single-session ADR-0012 alternative to the
# spec → triage → ready flow; the two branches re-converge at
# sdd:in-progress.
lifecycle:
  - sdd:spec
  - sdd:triage
  - sdd:ready
  - sdd:fastpath
  - sdd:fastpath-review
  - sdd:in-progress
  - sdd:review
  - sdd:done

# Marker labels. Orthogonal to the lifecycle state machine: a marker
# may coexist with any lifecycle label, and `add-labels` of a marker
# does not need to be paired with a `remove-labels` of a previous state.
# `needs-human` is the universal agent-to-human hand-off (ADR 0001).
markers:
  - needs-human
  # sdd:dispatched marks a tracking issue as armed for cascade
  # re-dispatch on task closure (ADR 0011). Orthogonal to the
  # lifecycle state; coexists with sdd:ready / sdd:in-progress.
  - sdd:dispatched
  # plan:provided marks a tracking issue whose body is a Claude plan
  # document. sdd-spec translates it into a spec and sdd-triage Phase A
  # translates its architecture section into architecture.md, instead of
  # authoring either from scratch (issue #102). Orthogonal to the
  # lifecycle state; set by the spec.md template, cleared by sdd-triage
  # Phase A when the architecture PR opens (or by sdd-spec on the
  # fast-path stub-spec exit).
  - plan:provided
  # sdd:approved marks a single-PR-path tracking issue whose /approve was
  # recorded while the spec PR was still open (ADR 0023). The deterministic
  # /approve handler in sdd-spec's wrapper sets it; the spec PR's merge
  # event consumes it (dispatching the implementation and clearing it), a
  # /revise after approval clears it (re-approval required), and a spec PR
  # closed without merging clears it. Orthogonal to the lifecycle state;
  # coexists with sdd:fastpath-review like plan:provided does.
  - sdd:approved
  # sdd:spike-resolved marks a kind:spike sub-issue whose experiment has
  # been resolved (issue #229). It is orthogonal to the tracking-issue
  # lifecycle state machine entirely: it lives on the spike sub-issue, not
  # on the tracking issue, and never participates in a tracking-issue
  # transition. Declared here so invariant 1 (every sdd:* label in the
  # catalogue is classified) holds; it is a marker, not a lifecycle state.
  - sdd:spike-resolved

# Directed transition graph. Key is the source state; value is the
# list of states reachable in one move from the source. Every state in
# `lifecycle:` must be reachable from `sdd:spec` by following these
# edges, and `sdd:done` is the only state allowed to have no outgoing
# edges (terminal). A state with no outgoing edges that is not
# `sdd:done` is a dead-end and fails the validator.
#
# The fast-path branch (ADR 0012) forks from sdd:spec on `/fastpath`
# and re-joins the main flow at sdd:in-progress on `/approve`. The
# branch oscillates sdd:fastpath ↔ sdd:fastpath-review while the stub
# spec PR is open / merged. `/spec` on a fast-path tracking issue is
# the misclassification-escalation reset (ADR 0012, sdd-spec.md step
# 3): both fast-path states transition back to sdd:spec.
transitions:
  sdd:spec: [sdd:triage, sdd:fastpath]
  sdd:triage: [sdd:ready]
  sdd:ready: [sdd:in-progress]
  sdd:fastpath: [sdd:fastpath-review, sdd:in-progress, sdd:spec]
  # sdd:fastpath-review -> sdd:in-progress is the approve-before-merge
  # shortcut (ADR 0023): with sdd:approved recorded, the spec PR's merge
  # event dispatches the implementation deterministically and skips the
  # return hop to sdd:fastpath. The write lives in the sdd-spec wrapper's
  # approved-merge-dispatch job (sdd-fastpath-approve action), not a
  # safe-output.
  sdd:fastpath-review: [sdd:fastpath, sdd:spec, sdd:in-progress]
  # Fast path skips sdd:review and goes straight to sdd:done; full path
  # routes through sdd:review on a clean validate pass.
  sdd:in-progress: [sdd:review, sdd:done]
  sdd:review: [sdd:done]

# Writer assignment. Each lifecycle label has an authoritative writer
# (or, where a deterministic wrapper co-writes the same transition, a
# small set of authorized writers). The validator collects, for each
# lifecycle label X, the set of workflow stems whose frontmatter
# `safe-outputs.add-labels.allowed` includes X, and asserts that set is
# a subset of the writer(s) named here (and non-empty). A value may be a
# single stem (string) or a list of authorized stems.
#
# The three `sdd-execute-{haiku,sonnet,opus}` variants are compiled
# from a single source and treated as aliases of the logical writer
# `sdd-execute`. The validator collapses them at compare time.
#
# `sdd:in-progress` has two authorized writers. `sdd-execute` owns the
# agent-side move when a run boots; `sdd-dispatch` co-writes it at
# claim time, marking each dispatched task `sdd:in-progress` (and
# removing `sdd:ready`) the moment it fans `/execute` out, so a
# dispatched-but-not-yet-booted task is visibly in flight (#200). The
# `sdd-dispatch` write is a deterministic wrapper action
# (`wrappers/sdd-dispatch.yml`), not a safe-output, so it does not
# appear in the frontmatter-derived actual set; it is declared here to
# keep this source-of-truth honest about who advances the label.
writers:
  sdd:triage: sdd-spec
  sdd:ready: sdd-triage
  sdd:fastpath: sdd-spec
  sdd:fastpath-review: sdd-spec
  # `sdd-spec` co-writes sdd:in-progress deterministically: the
  # sdd-fastpath-approve action in its wrapper moves a single-PR-path
  # tracking issue to sdd:in-progress when the dispatch fires (on
  # /approve after the spec merge, or on the merge of an approved spec
  # PR — ADR 0012/0023). Like the sdd-dispatch claim-time write, it is
  # not a safe-output and never appears in the frontmatter-derived set;
  # it is declared here to keep this source-of-truth honest.
  sdd:in-progress: [sdd-execute, sdd-dispatch, sdd-spec]
  sdd:review: sdd-validate
  sdd:done: sdd-execute

# Writer aliases. Multiple compiled workflow stems may map to one
# logical writer. This mirrors how the slash-command consistency test
# (#84) treats `/execute` routing across the three sdd-execute-* wrappers
# as a single command source. Without aliasing, every lifecycle label
# `sdd-execute` writes would falsely register as three writers.
writer_aliases:
  sdd-execute:
    - sdd-execute-haiku
    - sdd-execute-sonnet
    - sdd-execute-opus
