site_name: spectacles
site_description: Spec-driven development as agentic GitHub Actions workflows.
theme:
  name: material
  logo: assets/svg/logo-dark.svg
  favicon: assets/svg/favicon.svg
  font:
    text: Source Serif 4
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
extra_css:
  - stylesheets/brand.css
markdown_extensions:
  - admonition
  - tables
  - fenced_code
nav:
  - Home: index.md
  - SDD:
      - The SDD pipeline: sdd/index.md
      - Installing the SDD suite: sdd/install.md
      - MCP tools: sdd/mcp-tools.md
  - Specs:
      - "01: Issue-native SDD": specs/01-spec-issue-native-sdd/01-spec-issue-native-sdd.md
not_in_nav: |
  assets/**
