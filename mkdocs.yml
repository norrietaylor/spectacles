site_name: spectacles
site_description: Spec-driven development as agentic GitHub Actions workflows.
repo_url: https://github.com/norrietaylor/spectacles
repo_name: norrietaylor/spectacles
edit_uri: edit/main/docs/
theme:
  name: material
  logo: assets/svg/logo-dark.svg
  favicon: assets/svg/favicon-light.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
extra_css:
  - stylesheets/brand.css
markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - Home: index.md
  - SDD:
      - The SDD pipeline: sdd/index.md
      - Installing the SDD suite: sdd/install.md
      - MCP tools: sdd/mcp-tools.md
  - Specs:
      - "01: Issue-native SDD": specs/01-spec-issue-native-sdd/01-spec-issue-native-sdd.md
not_in_nav: |
  assets/**
