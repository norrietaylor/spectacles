<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <title>spectacles wordmark lockup</title>
  <desc>spectacles logo mark with wordmark and tagline, light theme.</desc>
  <rect width="800" height="360" fill="#f4ecd8"/>

  <!-- Mark, centered horizontally, upper region -->
  <g transform="translate(400 100) scale(1.05)" fill="none" stroke="#1a1f2e" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="-138" cy="0" r="5" fill="#1a1f2e" stroke="none"/>
    <line x1="-150" y1="0" x2="-144" y2="0" stroke-width="1.2"/>
    <path d="M-132 0 L -98 0" stroke-width="1.6"/>
    <circle cx="-95" cy="0" r="3" fill="#1a1f2e" stroke="none"/>
    <path d="M-92 0 L -78 0" stroke-width="2"/>
    <circle cx="-42" cy="0" r="36" stroke-width="2.2"/>
    <line x1="-54" y1="0" x2="-30" y2="0" stroke-width="0.9"/>
    <line x1="-42" y1="-12" x2="-42" y2="12" stroke-width="0.9"/>
    <circle cx="-42" cy="0" r="2" fill="#1a1f2e" stroke="none"/>
    <line x1="-42" y1="-32" x2="-42" y2="-28" stroke-width="1"/>
    <line x1="-42" y1="28" x2="-42" y2="32" stroke-width="1"/>
    <path d="M-6 -3 Q 0 -11 6 -3" stroke-width="2.2"/>
    <circle cx="42" cy="0" r="36" stroke-width="2.2"/>
    <line x1="30" y1="0" x2="54" y2="0" stroke-width="0.9"/>
    <line x1="42" y1="-12" x2="42" y2="12" stroke-width="0.9"/>
    <circle cx="42" cy="0" r="3" fill="#b8862a" stroke="none"/>
    <line x1="42" y1="-32" x2="42" y2="-28" stroke-width="1"/>
    <line x1="42" y1="28" x2="42" y2="32" stroke-width="1"/>
    <path d="M78 0 L 92 0" stroke-width="2"/>
    <circle cx="95" cy="0" r="3" fill="#1a1f2e" stroke="none"/>
    <path d="M97 0 L 115 -28 L 132 -28" stroke-width="1.4"/>
    <path d="M97 0 L 132 0" stroke-width="1.4"/>
    <path d="M97 0 L 115 28 L 132 28" stroke-width="1.4"/>
    <circle cx="136" cy="-28" r="4" fill="#b8862a" stroke="none"/>
    <circle cx="136" cy="0" r="4" fill="#b8862a" stroke="none"/>
    <circle cx="136" cy="28" r="4" fill="#b8862a" stroke="none"/>
  </g>

  <!-- Wordmark -->
  <text x="400" y="240" text-anchor="middle"
        font-family="Fraunces, Georgia, 'Times New Roman', serif"
        font-size="64" font-weight="500" fill="#1a1f2e"
        letter-spacing="-1">spectacles</text>

  <!-- Brass rule -->
  <line x1="330" y1="262" x2="470" y2="262" stroke="#b8862a" stroke-width="1.2"/>

  <!-- Tagline -->
  <text x="400" y="295" text-anchor="middle"
        font-family="Fraunces, Georgia, serif"
        font-size="14" font-weight="400" font-style="italic"
        fill="#5a5246" letter-spacing="3.5">SPEC-DRIVEN AGENTS · GITHUB ACTIONS</text>
</svg>
