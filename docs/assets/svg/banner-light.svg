<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <title>spectacles banner</title>
  <desc>spectacles README banner — light theme.</desc>
  <rect width="1500" height="500" fill="#ffffff"/>

  <!-- LEFT: wordmark and tagline anchor -->
  <g transform="translate(100 250)">
    <g transform="translate(0 -100)"><g transform="scale(1.1)">
        <path d="M 0 -30 L 26 18 L -26 18 Z" fill="#1a1a1a"/>
        <circle cx="0" cy="2" r="6" fill="#1e3a8a"/>
    </g></g>
    <text x="0" y="0" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="600" fill="#1a1a1a" letter-spacing="-2">spectacles</text>
    <text x="0" y="38" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="400" fill="#666666" letter-spacing="-0.1">Spec-driven development agents, built as GitHub Actions workflows.</text>
  </g>

  <!-- Subtle divider between wordmark and diagram -->
  <line x1="650" y1="120" x2="650" y2="380" stroke="#999999" stroke-width="1" opacity="0.5"/>

  <!-- RIGHT: workflow diagram -->
  <g transform="translate(1080 250)"><circle cx="-180" cy="0" r="5" fill="#1a1a1a"/>
        <line x1="-175" y1="0" x2="-60.6" y2="0" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
        <text x="-180" y="-22" text-anchor="middle" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#1a1a1a">spec issue</text>
        <g><g transform="scale(2.1)">
        <path d="M 0 -30 L 26 18 L -26 18 Z" fill="#1a1a1a"/>
        <circle cx="0" cy="2" r="6" fill="#1e3a8a"/>
    </g></g>
        <text x="0" y="-85.0" text-anchor="middle" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#1a1a1a">observe / decide</text>
        <line x1="60.6" y1="0" x2="101.6" y2="0" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
        <circle cx="104.6" cy="0" r="4" fill="#1a1a1a"/>
        <path d="M 107.6 0 L 129.6 -44 L 149.6 -44" stroke="#1a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="154.6" cy="-44" r="5" fill="#1e3a8a"/>
        <text x="168.6" y="-40" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#1a1a1a">plan</text>
        <line x1="107.6" y1="0" x2="149.6" y2="0" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="154.6" cy="0" r="5" fill="#1e3a8a"/>
        <text x="168.6" y="4" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#1a1a1a">execute</text>
        <path d="M 107.6 0 L 129.6 44 L 149.6 44" stroke="#1a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="154.6" cy="44" r="5" fill="#1e3a8a"/>
        <text x="168.6" y="48" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#1a1a1a">review</text></g>
</svg>