<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <title>spectacles social card</title>
  <desc>spectacles social card — dark theme.</desc>
  <rect width="1280" height="640" fill="#0e0e10"/>

  <!-- LEFT: wordmark anchor -->
  <g transform="translate(100 280)">
    <!-- small mark above wordmark -->
    <g transform="translate(0 -90)"><g transform="scale(1.0)">
        <path d="M 0 -30 L 26 18 L -26 18 Z" fill="#f5f5f5"/>
        <circle cx="0" cy="2" r="6" fill="#3b5fc9"/>
    </g></g>
    <text x="0" y="0" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="82" font-weight="600" fill="#f5f5f5" letter-spacing="-2.5">spectacles</text>
    <text x="0" y="42" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="400" fill="#a0a0a0" letter-spacing="-0.2">Spec-driven development agents, built as GitHub Actions workflows.</text>
  </g>

  <!-- RIGHT: workflow diagram -->
  <g transform="translate(970 340)"><circle cx="-180" cy="0" r="5" fill="#f5f5f5"/>
        <line x1="-175" y1="0" x2="-58.0" y2="0" stroke="#f5f5f5" stroke-width="2" stroke-linecap="round"/>
        <text x="-180" y="-22" text-anchor="middle" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#f5f5f5">spec issue</text>
        <g><g transform="scale(2.0)">
        <path d="M 0 -30 L 26 18 L -26 18 Z" fill="#f5f5f5"/>
        <circle cx="0" cy="2" r="6" fill="#3b5fc9"/>
    </g></g>
        <text x="0" y="-82.0" text-anchor="middle" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#f5f5f5">observe / decide</text>
        <line x1="58.0" y1="0" x2="99.0" y2="0" stroke="#f5f5f5" stroke-width="2" stroke-linecap="round"/>
        <circle cx="102.0" cy="0" r="4" fill="#f5f5f5"/>
        <path d="M 105.0 0 L 127.0 -44 L 147.0 -44" stroke="#f5f5f5" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="152.0" cy="-44" r="5" fill="#3b5fc9"/>
        <text x="166.0" y="-40" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#f5f5f5">plan</text>
        <line x1="105.0" y1="0" x2="147.0" y2="0" stroke="#f5f5f5" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="152.0" cy="0" r="5" fill="#3b5fc9"/>
        <text x="166.0" y="4" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#f5f5f5">execute</text>
        <path d="M 105.0 0 L 127.0 44 L 147.0 44" stroke="#f5f5f5" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="152.0" cy="44" r="5" fill="#3b5fc9"/>
        <text x="166.0" y="48" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#f5f5f5">review</text></g>

  <!-- Bottom-left: URL -->
  <text x="100" y="585" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="500" fill="#666666" letter-spacing="-0.2">github.com/norrietaylor/spectacles</text>
</svg>