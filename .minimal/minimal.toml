# Vendored from jtnkminimal/min-env minimal.toml @ d2877340
[upstream]
repo = "https://github.com/gominimal/pkgs"
branch = "main"
locked_commit = "616a592b93d2f635ef2b3cdb482f2b608fc4f9c5"

[harness]
use = "shell"

[defaults]
state_key = "dev"

[tasks.shell]
interactive = true
packages = ["base"]
exec = "bash --noprofile -l"

[tasks.claude]
packages = ["base", "claude-code"]
exec = "claude --dangerously-skip-permissions"
patches.dir."~/.claude" = "read-write"
patches.file."~/.claude.json" = "read-write"

[tasks.dev]
interactive = true
packages = ["claude-code", "base", "vim", "zellij", "fd", "fzf", "ripgrep", "git", "jq"]
patches.dir."~/.claude" = "read-write"
patches.file."~/.claude.json" = "read-write"
patches.file."~/.gitconfig" = "read-only"
patches.file."~/.vimrc" = "read-write"
bash = "scripts/setup-dev.sh"

[tasks.menu]
exec = "mintui"
interactive = true
