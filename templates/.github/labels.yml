# Labels for the spectacles SDD suite.
#
# scripts/quick-setup.sh syncs these onto a consumer repo. Colors are
# six-digit hex without a leading '#'. Base labels were added in Unit 1; the
# SDD lifecycle labels (sdd:*) and the model-tier labels (model:*) below were
# added in Unit 2.
- name: needs-human
  color: b60205
  description: An agent handed off; a human must act, then clear this label.
- name: kind:bug
  color: d73a4a
  description: Something is not working.
- name: kind:feature
  color: a2eeef
  description: A new feature or capability.
- name: kind:chore
  color: ededed
  description: Maintenance, refactor, or internal improvement.
- name: kind:spike
  color: c2e0c6
  description: A bounded spike that resolves a load-bearing assumption before planning. See ADR 0010, issue 229.
- name: priority:must-have
  color: b60205
  description: Must be done.
- name: priority:should-have
  color: fbca04
  description: Should be done.
- name: priority:nice-to-have
  color: 0e8a16
  description: Nice to have.
- name: sdd:spec
  color: 1d76db
  description: Lifecycle - the feature is being specified by sdd-spec.
- name: sdd:fastpath
  color: 1f6feb
  description: Lifecycle - fast-path is armed; awaiting stub spec merge or /approve. See ADR 0012.
- name: sdd:fastpath-review
  color: 5294e2
  description: Lifecycle - fast-path stub spec PR is open, awaiting human merge. See ADR 0012.
- name: sdd:approved
  color: 6f42c1
  description: Marker - /approve recorded while the spec PR is open; its merge dispatches the implementation. See ADR 0023.
- name: sdd:triage
  color: 0052cc
  description: Lifecycle - the spec is in architecture and triage by sdd-triage.
- name: sdd:ready
  color: 0e8a16
  description: Lifecycle - tasks are decomposed and ready for sdd-execute.
- name: sdd:in-progress
  color: fbca04
  description: Lifecycle - a task is being implemented by sdd-execute.
- name: sdd:review
  color: 5319e7
  description: Lifecycle - the implementation passed validation and awaits review.
- name: sdd:done
  color: 0e8a16
  description: Lifecycle - every task is complete; a human does the final close.
- name: sdd:dispatched
  color: 5319e7
  description: Cascade execution is armed. sdd-dispatch re-fires on every task close until the tree is empty.
- name: sdd:spike-resolved
  color: 0e8a16
  description: Marker - a kind:spike sub-issue's experiment is resolved; its finding feeds the plan. See issue 229.
- name: model:haiku
  color: c5def5
  description: Tier - a low-complexity task; run by the haiku sdd-execute variant.
- name: model:sonnet
  color: 5319e7
  description: Tier - a moderate-complexity task; run by the sonnet sdd-execute variant.
- name: model:opus
  color: b60205
  description: Tier - a high-complexity task; run by the opus sdd-execute variant.
- name: plan:provided
  color: bfd4f2
  description: Marker - a Claude plan is in the tracking-issue body; sdd-spec and sdd-triage translate it.
