name: sdd-route-review
description: >
  Route decision for sdd-review. Admits review on sdd/* head-ref PRs, builds
  aw_context. Extracted verbatim (ADR 0015).

inputs:
  github-token:
    description: 'Token for the REST calls in the route logic.'
    required: false
    default: ${{ github.token }}

outputs:
  should_run:
    description: "'true' when the agent should run."
    value: ${{ steps.decide.outputs.should_run }}
  aw_context:
    description: 'JSON naming the triggering entity; empty when should_run is false.'
    value: ${{ steps.decide.outputs.aw_context }}

runs:
  using: composite
  steps:
    - name: Decide whether to run and build aw_context
      id: decide
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        github-token: ${{ inputs.github-token }}
        script: |
            const payload = context.payload;
            let run = false;
            let ctx = {};

            // An implementation pull request was opened or synchronized. The
            // review runs only when the head branch carries the sdd-execute
            // implementation branch prefix sdd/, which scopes the agent to
            // implementation PRs. A draft pull request is still reviewed:
            // review is advisory and never blocks.
            const action = payload.action;
            if (action === 'opened' || action === 'synchronize') {
              const headRef = payload.pull_request.head.ref || '';
              if (headRef.startsWith('sdd/')) {
                run = true;
                ctx = {
                  item_type: 'pull_request',
                  item_number: payload.pull_request.number,
                };
              }
            }

            core.setOutput('should_run', run ? 'true' : 'false');
            core.setOutput('aw_context', run ? JSON.stringify(ctx) : '');
