name: sdd-dispatch-compute
description: >
  Compute the ready set and precondition state for the sdd-dispatch cascade.
  Walks the tracking issue's sub-issue tree, parses each open task's depends-on
  block, and emits the dispatch matrix plus the precondition/lifecycle state.
  Extracted verbatim from the wrapper (ADR 0004, ADR 0015).

inputs:
  tracking-issue:
    description: 'The tracking issue number resolved by sdd-route-dispatch.'
    required: true
  trigger-kind:
    description: 'The trigger kind resolved by sdd-route-dispatch.'
    required: true
  github-token:
    description: 'Token for the REST and GraphQL calls.'
    required: false
    default: ${{ github.token }}

outputs:
  matrix:
    description: 'JSON matrix of {task, tier} pairs to fan out over.'
    value: ${{ steps.compute.outputs.matrix }}
  ready_count:
    description: 'Number of ready tasks.'
    value: ${{ steps.compute.outputs.ready_count }}
  open_task_count:
    description: 'Number of open task sub-issues.'
    value: ${{ steps.compute.outputs.open_task_count }}
  precondition:
    description: 'Precondition state on the tracking issue.'
    value: ${{ steps.compute.outputs.precondition }}
  tracking_state:
    description: 'Lifecycle label state on the tracking issue.'
    value: ${{ steps.compute.outputs.tracking_state }}
  reason:
    description: 'Human-readable reason for the precondition outcome.'
    value: ${{ steps.compute.outputs.reason }}
  closeable_units:
    description: >
      JSON array of Unit issue numbers whose every task child is closed
      while the Unit itself is still open. The wrapper's lifecycle job
      closes these deterministically (#233).
    value: ${{ steps.compute.outputs.closeable_units }}

runs:
  using: composite
  steps:
    - name: Compute ready set and precondition state
      id: compute
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        TRACKING_ISSUE: ${{ inputs.tracking-issue }}
        TRIGGER_KIND: ${{ inputs.trigger-kind }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
            // Shared, dependency-free blocked-by parser (one source of truth
            // with sdd-cycle-detect). GITHUB_ACTION_PATH is this action's dir;
            // '..' reaches the actions/ dir, then shared/blocked-by.js.
            const { parseBlockers } = require(
              require('path').join(
                process.env.GITHUB_ACTION_PATH, '..', 'shared',
                'blocked-by.js'));

            const tracking = parseInt(process.env.TRACKING_ISSUE, 10);
            const triggerKind = process.env.TRIGGER_KIND;

            // Read the tracking issue and its lifecycle label.
            const { data: trackingIssue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: tracking,
            });
            const labels = (trackingIssue.labels || []).map(
              (l) => l.name || l);
            const lifecycle = labels.find((l) => l.startsWith('sdd:')
              && l !== 'sdd:dispatched');
            const hasNeedsHuman = labels.includes('needs-human');

            // Precondition. /dispatch is valid when the tracking issue
            // carries sdd:ready, sdd:in-progress, or sdd:review. A cascade
            // fire skips this check (the tracking issue carries
            // sdd:dispatched, which is only applied alongside
            // sdd:in-progress or sdd:review). A needs-human label means the
            // tracking issue is held for the human; defer unconditionally.
            //
            // sdd:review is accepted because the tracker can advance there
            // while open task sub-issues remain unstarted: sdd-execute moves
            // the feature to sdd:review once the first layer of impl PRs is
            // open, before later layers are even dispatched. Refusing
            // /dispatch (and close-triggered re-dispatch) at sdd:review would
            // wedge the cascade, leaving ready tasks unstarted (issue #134).
            // Treat sdd:review as armed for the remaining ready tasks: arm
            // sdd:dispatched and fan out, but leave the lifecycle label
            // alone (sdd-execute owns the lifecycle transitions).
            let precondition = 'ok';
            let reason = '';
            if (hasNeedsHuman) {
              precondition = 'needs_human';
              reason = 'Tracking issue carries needs-human; deferring.';
            } else if (triggerKind === 'command') {
              if (lifecycle === 'sdd:ready'
                  || lifecycle === 'sdd:in-progress'
                  || lifecycle === 'sdd:review') {
                precondition = 'ok';
              } else if (lifecycle === 'sdd:spec'
                  || lifecycle === 'sdd:triage') {
                precondition = 'refuse_early';
                reason = 'Tracking issue is at `' + lifecycle
                  + '`. /dispatch is valid only on a tracking issue carrying'
                  + ' `sdd:ready`, `sdd:in-progress`, or `sdd:review`. Merge'
                  + ' the spec and the architecture PRs, then comment'
                  + ' `/approve` on the tracking issue to materialize the'
                  + ' plan and reach `sdd:ready`.';
              } else if (lifecycle === 'sdd:done') {
                precondition = 'refuse_late';
                reason = 'Tracking issue is at `' + lifecycle
                  + '`; no further dispatch work applies.';
              } else {
                precondition = 'refuse_late';
                reason = 'Tracking issue carries no recognized sdd:*'
                  + ' lifecycle label; nothing to dispatch.';
              }
            }
            core.setOutput('precondition', precondition);
            core.setOutput('tracking_state', lifecycle || '');
            core.setOutput('reason', reason);

            if (precondition !== 'ok') {
              core.setOutput('matrix', JSON.stringify({ include: [] }));
              core.setOutput('ready_count', '0');
              core.setOutput('open_task_count', '0');
              // No tree walk ran, so no Unit is nominated for closure. A
              // refused /dispatch must never close a Unit.
              core.setOutput('closeable_units', '[]');
              return;
            }

            // Walk Feature -> Unit -> task. List sub-issues of the tracking
            // issue (Units), then for each Unit list its sub-issues (tasks).
            // A single-task Unit collapses to a feature-parented task (ADR
            // 0028): such a task is a direct child of the tracking issue with
            // no intervening Unit, so the walk admits it directly. A direct
            // child is a task — not a Unit, spec, or architecture sub-issue —
            // when it carries exactly one model:* tier label; only tasks carry
            // a model:* tier (the same disambiguator the ready-set loop uses).
            // The REST sub-issues endpoint returns child issues. A page size
            // of 100 covers any realistic feature; this loops if needed.
            const SUPPORTED_TIERS = new Set([
              'model:haiku', 'model:sonnet', 'model:opus']);
            function isTask(issue) {
              const names = (issue.labels || []).map((l) => l.name || l);
              const tiers = names.filter((l) => SUPPORTED_TIERS.has(l));
              return tiers.length === 1;
            }
            async function listChildren(parentNumber) {
              const items = [];
              let page = 1;
              for (;;) {
                const { data } = await github.request(
                  'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                  {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: parentNumber,
                    per_page: 100,
                    page,
                  });
                items.push(...data);
                if (data.length < 100) {
                  break;
                }
                page += 1;
              }
              return items;
            }

            const directChildren = await listChildren(tracking);
            const tasks = [];
            // Units whose every task child is closed while the Unit itself
            // is still open. The wrapper's lifecycle job closes these
            // deterministically (#233), replacing the prompt-driven
            // Unit-close sdd-execute's step-8 sweep used to own (ADR 0005
            // §4-5) — a path that only fired on a merged-PR run and missed
            // manual closes. We ride the same tree walk that already groups
            // tasks per Unit, so the walk stays single-sourced.
            const closeableUnits = [];
            for (const child of directChildren) {
              // A feature-parented task (collapsed single-task Unit, ADR
              // 0028) is a leaf task with no Unit to close: admit it to the
              // task set directly and never nominate it for Unit closure.
              if (isTask(child)) {
                tasks.push(child);
                continue;
              }
              // Otherwise this is a Unit (or a spec/architecture sub-issue):
              // descend for its tasks.
              const children = await listChildren(child.number);
              for (const grandchild of children) {
                tasks.push(grandchild);
              }
              // Fail-closed Unit-close test. Only nominate a Unit for
              // closure when:
              //   - the Unit itself is still open (no redundant re-close;
              //     mirrors the dual-path sdd:done idempotency contract),
              //   - it has at least one task child (never close a Unit
              //     mid-setup before its tasks are materialized — "all of
              //     zero children closed" is vacuously true but closing an
              //     empty Unit is never intended; this also excludes the
              //     spec and architecture sub-issues, which have no task
              //     children),
              //   - and EVERY child is confirmed closed. A child whose
              //     state we cannot read is not 'closed', so it fails this
              //     test and the Unit is left open: an unreadable sibling
              //     never triggers a false Unit-close (issue acceptance #4).
              //     listChildren throwing propagates and fails the whole
              //     action, which is itself fail-closed (no close is
              //     emitted on a partial walk).
              if (child.state === 'open'
                  && children.length > 0
                  && children.every((c) => c.state === 'closed')) {
                closeableUnits.push(child.number);
              }
            }
            core.setOutput('closeable_units', JSON.stringify(closeableUnits));

            // Filter to open tasks. We need their full body to parse the
            // `## Task` block; the sub-issues listing already includes
            // body, but re-fetch defensively when body is missing.
            const openTasks = tasks.filter((t) => t.state === 'open');
            const openTaskCount = openTasks.length;
            core.setOutput('open_task_count', String(openTaskCount));

            // Blocked-by lines are parsed below with the shared parseBlockers
            // helper (`blocked by #<N>` and `blocked by <owner>/<repo>#<N>`).
            // A task with zero blockers is born ready; a task whose every
            // blocker resolves to a closed issue is now ready.

            // Build a set of closed task issue numbers in the same repo so
            // blocker-resolution is O(1). Cross-repo blockers are read via
            // a per-blocker fetch, but a same-repo blocker — the common
            // case — is resolved from the tree state we already have.
            const closedTasksInTree = new Set(
              tasks.filter((t) => t.state === 'closed').map((t) => t.number));

            async function isBlockerOpen(owner, repo, number) {
              const isCross = owner && (
                owner !== context.repo.owner || repo !== context.repo.repo);
              if (!isCross && closedTasksInTree.has(number)) {
                return false;
              }
              // Look up the blocker. A blocker that is not under this
              // tracking issue at all (an external dependency in the same
              // repo, or a cross-repo task) needs an explicit fetch.
              try {
                const { data } = await github.rest.issues.get({
                  owner: owner || context.repo.owner,
                  repo: repo || context.repo.repo,
                  issue_number: number,
                });
                return data.state === 'open';
              } catch (err) {
                // A blocker we cannot resolve is conservatively treated as
                // open, so we do not dispatch a task whose dependencies
                // we cannot verify.
                core.info('Could not resolve blocker #' + number + ': '
                  + err.message);
                return true;
              }
            }

            // Detect in-flight tasks: those linked to an open
            // implementation pull request (a live run opens an sdd/ PR or
            // a PR whose body closes the task). An open PR — not the
            // sdd:in-progress label alone — is the authoritative in-flight
            // signal, so a task stranded in sdd:in-progress with no PR is
            // still admitted to the ready set. Listing every open PR once
            // is cheaper than asking per-task. Paginate
            // across pages of 100 so a repo with more than 100 open PRs
            // does not silently miss in-flight task links and cause a
            // re-dispatch of an already-active task.
            const inFlightFromPrs = new Set();
            for (let page = 1; ; page += 1) {
              const { data: openPrs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
                page,
              });
              for (const pr of openPrs) {
                const headRef = (pr.head && pr.head.ref) || '';
                const headMatch = headRef.match(/^sdd\/(\d+)-/);
                if (headMatch) {
                  inFlightFromPrs.add(parseInt(headMatch[1], 10));
                  continue;
                }
                const body = pr.body || '';
                const closeMatch = body.match(
                  /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i);
                if (closeMatch) {
                  inFlightFromPrs.add(parseInt(closeMatch[1], 10));
                }
              }
              if (openPrs.length < 100) {
                break;
              }
            }

            // Compose the ready set.
            const ready = [];
            for (const task of openTasks) {
              const taskLabels = (task.labels || []).map(
                (l) => l.name || l);
              if (taskLabels.includes('needs-human')) {
                continue;
              }
              // sdd:in-progress normally means a run is live, but that case
              // is already caught by the open-implementation-PR check
              // below — an active run has an open sdd/ PR or a Closes #N
              // body link. A pre-agent execute failure can strand a task
              // in sdd:in-progress with no open PR and no run (issue #201);
              // sdd-monitor re-dispatches exactly that case, so we must
              // admit a non-in-flight sdd:in-progress task here rather than
              // excluding it unconditionally (otherwise the re-dispatch
              // never re-executes the stranded task).
              if (inFlightFromPrs.has(task.number)) {
                continue;
              }
              const modelLabels = taskLabels.filter(
                (l) => l.startsWith('model:'));
              const supportedTiers = new Set([
                'model:haiku',
                'model:sonnet',
                'model:opus',
              ]);
              if (modelLabels.length !== 1
                  || !supportedTiers.has(modelLabels[0])) {
                // A task without a model:* tier cannot be routed to a
                // sdd-execute-{tier} variant; a task with more than one
                // tier label would wake more than one tier's wrapper;
                // a single tier label outside {haiku, sonnet, opus}
                // (e.g. a typo) would post /execute but no wrapper claims
                // it. All three are triage bugs, not this agent's concern.
                //
                // Silently skipping is not enough: the invalid task still
                // counts toward open_task_count, so the dispatcher would
                // arm `sdd:dispatched` on the tracking issue and the
                // lifecycle job would never disarm it (open_task_count
                // never reaches 0). Refuse the whole /dispatch run with a
                // clear reason naming the offending task; the human can
                // fix the labels and re-dispatch.
                let badness;
                if (modelLabels.length === 0) {
                  badness = 'no';
                } else if (modelLabels.length > 1) {
                  badness = 'multiple';
                } else {
                  badness = 'an unsupported';
                }
                const message = 'Task #' + task.number + ' has ' + badness
                  + ' model:* label(s) (' + modelLabels.join(', ')
                  + '). Fix the task labels (exactly one of model:haiku,'
                  + ' model:sonnet, model:opus) and re-comment /dispatch.';
                core.setOutput('precondition', 'refuse_early');
                core.setOutput('reason', message);
                core.setOutput('matrix', JSON.stringify({ include: [] }));
                core.setOutput('ready_count', '0');
                // This run is refused; do not close any Unit even if the
                // units loop above nominated one. The wrapper also gates
                // Unit-close on precondition === 'ok', so this is belt and
                // braces.
                core.setOutput('closeable_units', '[]');
                return;
              }
              const body = task.body || '';
              const blockers = parseBlockers(body);
              let anyOpen = false;
              for (const b of blockers) {
                if (await isBlockerOpen(b.owner, b.repo, b.number)) {
                  anyOpen = true;
                  break;
                }
              }
              if (!anyOpen) {
                // Each ready item is a single task issue number. The fan-out
                // step posts /execute on the task issue; the matching
                // sdd-execute-{tier} wrapper picks the comment up via its
                // wrapper-level command + tier gate (see ADR 0014). The
                // model:* label is still required upstream (the `if (!tier)`
                // guard a few lines above) so the matching tier has a
                // wrapper to route to.
                ready.push({
                  task: task.number,
                });
              }
            }

            core.setOutput('ready_count', String(ready.length));
            // Matrix format: { include: [...] } so each item drives one
            // matrix cell. The dispatch job fans this out with max-parallel
            // bounded by SDD_DISPATCH_MAX_PARALLEL.
            core.setOutput('matrix', JSON.stringify({ include: ready }));
