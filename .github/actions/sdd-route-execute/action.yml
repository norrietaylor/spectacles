name: sdd-route-execute
description: >
  Decision logic shared by the three sdd-execute model-tier wrapper variants.
  Resolves which trigger fired, gates /execute and /revise on real repository
  permission (or the configured App identity), enforces the model:<tier> gate,
  handles the CHANGES_REQUESTED and failed-check auto-revise loops with
  their iteration cap, and emits should_run plus the aw_context JSON the hosted
  lock consumes. Extracted
  verbatim from the wrappers so the routing logic lives in one place; the only
  per-variant difference is the tier input. See ADR 0004 and ADR 0015.

inputs:
  tier:
    description: 'Model tier this caller variant claims (haiku|sonnet|opus).'
    required: true
  app-id:
    description: >
      Configured GitHub App ID. A /execute comment posted by sdd-dispatch's
      cascade fan-out under the App identity is accepted when its
      performed_via_github_app.id matches this; a human /execute still goes
      through the repository-permission check.
    required: false
    default: ''
  max-review-iterations:
    description: 'Cap on auto-revise cycles per PR. Defaults to 3 when empty.'
    required: false
    default: ''
  revise-on-checks:
    description: >
      Which failing check runs on a completed check_suite trigger the implicit
      /revise (issue #259): 'all' treats every failure-conclusion check run as
      actionable; 'required' restricts the trigger to checks that gate merge
      (repository rulesets merged with classic branch protection). Defaults to
      'all' when empty.
    required: false
    default: ''
  revise-checks-exclude:
    description: >
      Comma-separated check-run-name globs (* matches any run of characters);
      a failing check run whose name matches any glob is ignored when deciding
      whether to trigger the implicit /revise (issue #259).
    required: false
    default: ''
  github-token:
    description: 'Token used for the REST and GraphQL calls in the route logic.'
    required: false
    default: ${{ github.token }}

outputs:
  should_run:
    description: "'true' when the agent job should run, 'false' otherwise."
    value: ${{ steps.decide.outputs.should_run }}
  aw_context:
    description: 'JSON naming the triggering entity; empty when should_run is false.'
    value: ${{ steps.decide.outputs.aw_context }}

runs:
  using: composite
  steps:
    - name: Decide whether to run and build aw_context
      id: decide
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        APP_ID: ${{ inputs.app-id }}
        SDD_MAX_REVIEW_ITERATIONS: ${{ inputs.max-review-iterations }}
        SDD_REVISE_CHECKS_EXCLUDE: ${{ inputs.revise-checks-exclude }}
        SDD_REVISE_ON_CHECKS: ${{ inputs.revise-on-checks }}
        TIER: ${{ inputs.tier }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
            const event = context.eventName;
            const payload = context.payload;
            let run = false;
            let ctx = {};
            // Set true by the CHANGES_REQUESTED auto-revise branch (issue
            // #128). The cap count, hidden marker, and needs-human side
            // effects are deferred until AFTER the tier gate below confirms
            // this variant owns the PR, so the two non-owning tiers never
            // mutate PR state (they would otherwise inflate the cap count).
            let reviewAutoRevise = false;
            let reviewPrNumber = 0;
            // Hidden marker that tracks the auto-revise cap. Defaults to the
            // CHANGES_REQUESTED marker (issue #128); the failed-check
            // revise path (issue #203) overrides it so the two remediation
            // loops carry independent retry budgets.
            let reviseMarker = '<!-- sdd-execute:auto-revise -->';

            // Collect the unresolved review-comment threads on a pull
            // request as directive lines ('- <path>: <body>'). Resolved
            // threads are skipped to avoid re-fixing addressed items;
            // thread resolution state is only exposed by GraphQL. This is
            // read-only. Shared by the CHANGES_REQUESTED implicit-revise
            // path (issue #128) and the manual /revise path (issue #247).
            // Pages through reviewThreads (following pageInfo.endCursor
            // until hasNextPage is false) so PRs with more than 100
            // threads do not silently drop unresolved feedback; mirrors
            // the contract in sdd-resolve-review-threads/action.yml.
            const collectUnresolvedThreadParts = async (prNumber) => {
              const parts = [];
              try {
                let cursor = null;
                let hasNextPage = true;
                while (hasNextPage) {
                  const result = await github.graphql(`
                    query($owner:String!,$repo:String!,$pr:Int!,$after:String) {
                      repository(owner:$owner,name:$repo) {
                        pullRequest(number:$pr) {
                          reviewThreads(first:100, after:$after) {
                            pageInfo { hasNextPage endCursor }
                            nodes {
                              isResolved
                              comments(first:1) { nodes { body path } }
                            }
                          }
                        }
                      }
                    }`, {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pr: prNumber,
                    after: cursor,
                  });
                  const reviewThreads = (result.repository
                    && result.repository.pullRequest
                    && result.repository.pullRequest.reviewThreads)
                    || null;
                  const threads = (reviewThreads && reviewThreads.nodes)
                    || [];
                  for (const t of threads) {
                    if (t.isResolved) {
                      continue;
                    }
                    const first = t.comments
                      && t.comments.nodes
                      && t.comments.nodes[0];
                    if (first && (first.body || '').trim()) {
                      const where = first.path ? (first.path + ': ') : '';
                      parts.push('- ' + where + first.body.trim());
                    }
                  }
                  hasNextPage = !!(reviewThreads
                    && reviewThreads.pageInfo
                    && reviewThreads.pageInfo.hasNextPage);
                  cursor = (reviewThreads
                    && reviewThreads.pageInfo
                    && reviewThreads.pageInfo.endCursor)
                    || null;
                }
              } catch (err) {
                core.info('Could not read review threads on PR #'
                  + prNumber + ': ' + err.message);
              }
              return parts;
            };

            // The model tier is supplied by the wrapper as the tier
            // input; the tier gate below skips a task another tier owns.
            const TIER = process.env.TIER;

            // A workflow_dispatch from sdd-dispatch (or from an operator
            // running the queue by hand) carries an aw_context input naming
            // the task to implement. The cron-based "schedule" trigger has
            // been removed (issue #81 / ADR 0011): execution is event-driven
            // now, dispatched per task from the cascade.
            if (event === 'workflow_dispatch') {
              const raw = (payload.inputs && payload.inputs.aw_context) || '';
              if (raw) {
                try {
                  ctx = JSON.parse(raw);
                  if (ctx && ctx.item_number) {
                    run = true;
                  } else {
                    core.info('workflow_dispatch aw_context missing'
                      + ' item_number; ignoring.');
                  }
                } catch (err) {
                  core.info('workflow_dispatch aw_context not parseable: '
                    + err.message);
                }
              } else {
                core.info('workflow_dispatch with no aw_context; ignoring.');
              }
            }

            // A /execute or /revise comment from either an author with repo
            // write access or sdd-dispatch's App identity. The gate is the
            // actor's real repository permission, not author_association:
            // author_association reports the relationship to the thread
            // (OWNER/MEMBER/COLLABORATOR), which is not the same as push
            // access. A MEMBER of the org need not have write on this repo,
            // and a COLLABORATOR may be read-only. The
            // collaborators/{user}/permission API returns the actual
            // permission level; only write, maintain, or admin may run a
            // command. /execute on a pull request is ignored: it is a
            // task-sub-issue command only.
            //
            // sdd-dispatch fans the cascade out by posting /execute on each
            // ready task issue via the App installation token (ADR 0014).
            // The App user is not a collaborator and would 404 the
            // permission check, so accept the command when the comment's
            // performed_via_github_app.id matches the configured APP_ID.
            // Any other bot posting /execute is still rejected.
            if (event === 'issue_comment' && payload.action === 'created') {
              const body = (payload.comment.body || '').trim();
              const firstWord = body.split(/\s+/)[0];
              const isPr = !!payload.issue.pull_request;
              const isExecute = firstWord === '/execute' && !isPr;
              const isRevise = firstWord === '/revise' && isPr;
              if (firstWord === '/execute' && isPr) {
                core.info('/execute on a pull request; ignoring.');
              } else if (isExecute || isRevise) {
                const appId = parseInt(process.env.APP_ID || '0', 10);
                const appComment = payload.comment.performed_via_github_app;
                const fromConfiguredApp = appId > 0
                  && appComment
                  && appComment.id === appId;
                let permission = 'none';
                if (!fromConfiguredApp) {
                  const actor = payload.comment.user.login;
                  try {
                    const resp = await github.rest.repos
                      .getCollaboratorPermissionLevel({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        username: actor,
                      });
                    // role_name is the precise role
                    // (write/maintain/triage/...) when present; permission is
                    // the legacy bucket (admin/write/read/none) that collapses
                    // maintain into write and triage into read.
                    permission = resp.data.role_name || resp.data.permission;
                  } catch (err) {
                    core.info(
                      'Could not resolve repo permission for ' + actor
                      + ': ' + err.message);
                  }
                }
                const canWrite = fromConfiguredApp
                  || permission === 'write'
                  || permission === 'maintain'
                  || permission === 'admin';
                if (canWrite) {
                  run = true;
                  if (isRevise) {
                    // Supplementary revision context (issue #247). The
                    // manual /revise path used to pass only the comment
                    // text, while the implicit-revise paths assemble a
                    // rich directive; close that asymmetry. Gather the
                    // PR's unresolved review-comment threads (the shared
                    // helper above) plus the recent discussion comments,
                    // so the author need not restate feedback already
                    // present in the thread. The /revise note stays the
                    // primary instruction; this directive is supplementary.
                    const prNumber = payload.issue.number;
                    const parts =
                      await collectUnresolvedThreadParts(prNumber);
                    try {
                      const comments = await github.paginate(
                        github.rest.issues.listComments, {
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: prNumber,
                          per_page: 100,
                        });
                      // The latest discussion comments, skipping the
                      // triggering /revise comment itself, other slash
                      // commands, and the hidden sdd-execute markers
                      // (e.g. the auto-revise iteration counters).
                      const recent = comments
                        .filter((c) => c.id !== payload.comment.id)
                        .filter((c) => {
                          const b = (c.body || '').trim();
                          return b.length > 0
                            && !b.startsWith('/')
                            && !b.includes('<!-- sdd-execute:');
                        })
                        .slice(-10);
                      for (const c of recent) {
                        const who = (c.user && c.user.login) || 'unknown';
                        parts.push('- ' + who + ': '
                          + (c.body || '').trim());
                      }
                    } catch (err) {
                      core.info('Could not list discussion comments on'
                        + ' PR #' + prNumber + ': ' + err.message);
                    }
                    const directive = parts.join('\n').trim();
                    ctx = {
                      trigger: 'revise',
                      item_type: 'pull_request',
                      item_number: prNumber,
                      comment_id: payload.comment.id,
                    };
                    if (directive) {
                      ctx.directive = directive;
                    }
                  } else {
                    ctx = {
                      trigger: 'command',
                      item_type: 'issue',
                      item_number: payload.issue.number,
                      comment_id: payload.comment.id,
                    };
                  }
                } else {
                  core.info(
                    'Command from an author without write access ('
                    + permission + '); ignoring.');
                }
              }
            }

            // A review comment on a pull request. The agent confirms the pull
            // request is one it opened (an sdd/<task-id>-<slug> branch) before
            // pushing follow-up commits.
            if (event === 'pull_request_review_comment'
                && payload.action === 'created') {
              run = true;
              ctx = {
                trigger: 'review_comment',
                item_type: 'pull_request',
                item_number: payload.pull_request.number,
                comment_id: payload.comment.id,
              };
            }

            // A formal review with state CHANGES_REQUESTED on an sdd/ PR is
            // treated as an implicit /revise (issue #128). A COMMENTED review
            // on an sdd/ PR that carries actionable content (a non-empty body
            // or unresolved review threads) is treated the same way (issue
            // #202): COMMENTED neither satisfies the merge gate (needs
            // APPROVED) nor triggers #128, so without this it strands the PR.
            // A content-free / automated-summary COMMENTED review (empty body
            // and no unresolved threads) is NOT actionable and is skipped, to
            // avoid spurious revise loops. The directive is the review body
            // plus the unresolved review-comment threads, so one revise run
            // addresses the whole verdict; the individual
            // pull_request_review_comment events that co-arrive collapse into
            // this run at the per-PR-per-tier concurrency group (the existing
            // dedupe mechanism). An APPROVED review does not match and never
            // triggers a revise. The manual /revise path above is untouched.
            // The agent confirms ownership (sdd/ head ref + body marker) at
            // step 7 exactly as it does for a review comment.
            if (event === 'pull_request_review'
                && payload.action === 'submitted') {
              const review = payload.review || {};
              const state = (review.state || '').toLowerCase();
              const pr = payload.pull_request || {};
              const headRef = (pr.head && pr.head.ref) || '';
              const isCommented = state === 'commented';
              if ((state === 'changes_requested' || isCommented)
                  && headRef.startsWith('sdd/')) {
                // Author scope: accept the configured App's own review,
                // CodeRabbit's bot review, or a review by an author with
                // repository write access, mirroring the /revise permission
                // check above. sdd-review posts its verdict via the configured
                // App (vars.APP_ID); the App user is not a collaborator and
                // would 404 the permission check, so accept the review when
                // review.performed_via_github_app.id matches APP_ID (mirrors
                // the /execute App handling above). A login of `coderabbitai`
                // (with or without a `[bot]` suffix) is the CodeRabbit bot.
                const reviewer = (review.user && review.user.login) || '';
                const reviewerLc = reviewer.toLowerCase();
                const appId = parseInt(process.env.APP_ID || '0', 10);
                const reviewApp = review.performed_via_github_app;
                const fromConfiguredApp = appId > 0
                  && reviewApp
                  && reviewApp.id === appId;
                const isCodeRabbit = reviewerLc === 'coderabbitai'
                  || reviewerLc === 'coderabbitai[bot]';
                let reviewerCanWrite = fromConfiguredApp || isCodeRabbit;
                if (!reviewerCanWrite && reviewer) {
                  let permission = 'none';
                  try {
                    const resp = await github.rest.repos
                      .getCollaboratorPermissionLevel({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        username: reviewer,
                      });
                    permission = resp.data.role_name || resp.data.permission;
                  } catch (err) {
                    core.info('Could not resolve repo permission for '
                      + reviewer + ': ' + err.message);
                  }
                  reviewerCanWrite = permission === 'write'
                    || permission === 'maintain'
                    || permission === 'admin';
                }
                if (!reviewerCanWrite) {
                  core.info('Review (' + state + ') by a non-allowed'
                    + ' reviewer (' + reviewer + '); ignoring.');
                } else {
                  const prNumber = pr.number;
                  // Assemble the directive: the review body plus the
                  // unresolved review-comment threads (the shared
                  // collectUnresolvedThreadParts helper above). This is
                  // read-only; the cap count and the side-effecting marker /
                  // needs-human are deferred to the post-tier-gate block so
                  // only the owning tier mutates PR state.
                  const parts = [];
                  if ((review.body || '').trim()) {
                    parts.push(review.body.trim());
                  }
                  parts.push(
                    ...await collectUnresolvedThreadParts(prNumber));
                  // A COMMENTED review is only actionable when it carries a
                  // body or at least one unresolved thread (i.e. `parts` is
                  // non-empty). A content-free / automated-summary COMMENTED
                  // review is skipped so it cannot spin up a spurious revise
                  // loop. CHANGES_REQUESTED is always actionable and keeps the
                  // generic fallback directive.
                  if (isCommented && parts.length === 0) {
                    core.info('Content-free COMMENTED review on PR #'
                      + prNumber + '; not actionable, skipping revise.');
                  } else {
                    const directive = parts.join('\n').trim()
                      || 'Address the requested changes.';
                    run = true;
                    reviewAutoRevise = true;
                    reviewPrNumber = prNumber;
                    ctx = {
                      trigger: 'revise',
                      item_type: 'pull_request',
                      item_number: prNumber,
                      directive,
                    };
                  }
                }
              }
            }

            // The needs-human label was cleared on a task sub-issue (resume a
            // step 5 or step 6 hand-off this agent applied). needs-human is
            // shared by all six SDD agents, so the agent itself confirms the
            // item is one it handed off before resuming.
            if (event === 'issues' && payload.action === 'unlabeled') {
              const label = payload.label && payload.label.name;
              if (label === 'needs-human') {
                run = true;
                ctx = {
                  trigger: 'resume',
                  item_type: 'issue',
                  item_number: payload.issue.number,
                };
              }
            }

            // The needs-human label was cleared on a pull request (resume a
            // step 7 hand-off this agent applied). needs-human is shared by
            // all six SDD agents, so the agent itself confirms the pull
            // request is one it opened before resuming.
            if (event === 'pull_request' && payload.action === 'unlabeled') {
              const label = payload.label && payload.label.name;
              if (label === 'needs-human') {
                run = true;
                ctx = {
                  trigger: 'resume',
                  item_type: 'pull_request',
                  item_number: payload.pull_request.number,
                };
              }
            }

            // A CI check failed on an open sdd/ PR (issue #203). A
            // post-approval (or pre-approval) red check leaves the PR
            // BLOCKED with no remediation: the CHANGES_REQUESTED auto-revise
            // path above fires only on a review verdict, never on a red check.
            // Treat a check_suite that completed with a failure conclusion on
            // an sdd/ head branch as an implicit /revise, mirroring that path:
            // the directive names the failing check(s) and points at the run
            // logs, and the same iteration cap (post-tier-gate block below)
            // bounds the retries before escalating with needs-human. Which
            // failing checks count is governed by the revise-on-checks input
            // (issue #259): 'all' by default, 'required' to restrict to
            // merge-gating checks; a check run matching a
            // revise-checks-exclude glob never counts in either mode. The
            // agent confirms ownership (sdd/ head ref + body marker) at step 7
            // exactly as it does for a CHANGES_REQUESTED review.
            if (event === 'check_suite' && payload.action === 'completed') {
              const suite = payload.check_suite || {};
              const conclusion = (suite.conclusion || '').toLowerCase();
              const headBranch = suite.head_branch || '';
              // The commit this suite ran against. A stale suite for an older
              // head_sha can finish after the PR tip has advanced; we only act
              // when the suite's commit still matches the open PR's head.
              const suiteSha = suite.head_sha || '';
              // Only a terminal failure conclusion is actionable; a green or
              // still-pending suite (success/neutral/skipped/null) is ignored.
              const isFailure = conclusion === 'failure'
                || conclusion === 'timed_out'
                || conclusion === 'cancelled'
                || conclusion === 'action_required';
              if (isFailure && headBranch.startsWith('sdd/')) {
                // A check_suite payload lists the PR(s) it belongs to. SDD
                // implementation PRs are same-repo branches, so the array is
                // populated. Pick the first open PR on this head branch.
                const suitePrs = (suite.pull_requests || []).filter(
                  (p) => p && p.number);
                let prNumber = 0;
                let baseBranch = '';
                for (const p of suitePrs) {
                  try {
                    const { data } = await github.rest.pulls.get({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: p.number,
                    });
                    if (data.state === 'open'
                        && data.head && data.head.ref === headBranch
                        && data.head.sha === suiteSha) {
                      prNumber = p.number;
                      baseBranch = data.base && data.base.ref || '';
                      break;
                    }
                  } catch (err) {
                    core.info('Could not fetch PR #' + p.number
                      + ' from check_suite: ' + err.message);
                  }
                }
                // Fallback when the payload's pull_requests array is empty
                // (it can be for some suite payloads): resolve the open PR by
                // head branch directly.
                if (!prNumber) {
                  try {
                    const { data } = await github.rest.pulls.list({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      state: 'open',
                      head: context.repo.owner + ':' + headBranch,
                      per_page: 1,
                    });
                    if (data && data[0] && data[0].number
                        && data[0].head && data[0].head.sha === suiteSha) {
                      prNumber = data[0].number;
                      baseBranch = data[0].base && data[0].base.ref || '';
                    }
                  } catch (err) {
                    core.info('Could not resolve open PR for ' + headBranch
                      + ': ' + err.message);
                  }
                }
                if (!prNumber) {
                  core.info('check_suite failure on ' + headBranch
                    + ' has no open PR; ignoring.');
                } else {
                  // Which failing check runs are actionable (issue #259).
                  // Mode 'all' (the default when revise-on-checks is empty):
                  // every failure-conclusion check run in the suite counts,
                  // with no protection lookup at all. The old required-only
                  // behaviour was silently dead on most repos: classic
                  // getBranchProtection needs administration:read, which the
                  // default GITHUB_TOKEN lacks, so the call 403'd, the error
                  // was swallowed as "no required contexts", and no failure
                  // ever triggered a revise. Mode 'required' restricts the
                  // trigger to checks that gate merge: required contexts are
                  // resolved from repository rulesets (the rules/branches
                  // endpoint, readable with a plain read token) merged
                  // best-effort with classic branch protection (a classic-API
                  // error is logged and contributes nothing).
                  const mode = (process.env.SDD_REVISE_ON_CHECKS || '')
                    .trim().toLowerCase() || 'all';
                  if (mode !== 'all' && mode !== 'required') {
                    core.info(`unrecognized revise-on-checks value "${mode}"; treating as "all"`);
                  }
                  const requiredOnly = mode === 'required';
                  const requiredContexts = new Set();
                  if (requiredOnly && baseBranch) {
                    // Repository rulesets: the modern protection mechanism.
                    // GET /repos/{owner}/{repo}/rules/branches/{branch}
                    // returns the active rules that apply to the branch,
                    // across every ruleset, and needs only contents: read.
                    try {
                      const rules = await github.paginate(
                        'GET /repos/{owner}/{repo}/rules/branches/{branch}',
                        {
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          branch: baseBranch,
                          per_page: 100,
                        });
                      for (const rule of rules) {
                        if (rule.type !== 'required_status_checks') {
                          continue;
                        }
                        const checks = (rule.parameters
                          && rule.parameters.required_status_checks) || [];
                        for (const c of checks) {
                          if (c && c.context) {
                            requiredContexts.add(c.context);
                          }
                        }
                      }
                    } catch (err) {
                      core.info('Could not read branch rules for '
                        + baseBranch + ': ' + err.message);
                    }
                    // Classic branch protection, merged in best-effort. The
                    // endpoint needs administration: read, which the default
                    // GITHUB_TOKEN lacks; an error (403/404) is logged and
                    // treated as contributing no contexts.
                    try {
                      const { data: prot } =
                        await github.rest.repos.getBranchProtection({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          branch: baseBranch,
                        });
                      const ctxs = prot && prot.required_status_checks
                        && prot.required_status_checks.contexts || [];
                      for (const c of ctxs) {
                        requiredContexts.add(c);
                      }
                    } catch (err) {
                      core.info('No classic branch protection for '
                        + baseBranch + ' (or not accessible): '
                        + err.message);
                    }
                  }
                  // Exclusion globs (issue #259): comma-separated
                  // check-run-name patterns where * matches any run of
                  // characters. A failed run whose name matches any pattern
                  // is ignored in either mode — typically advisory E2E or
                  // build matrices whose flakes would burn the retry budget
                  // for nothing.
                  const excludeGlobs =
                    (process.env.SDD_REVISE_CHECKS_EXCLUDE || '')
                      .split(',')
                      .map((g) => g.trim())
                      .filter((g) => g.length > 0);
                  const globToRegExp = (glob) => new RegExp('^'
                    + glob.split('*')
                      .map((s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))
                      .join('.*')
                    + '$');
                  const excludeRes = excludeGlobs.map(globToRegExp);
                  const isExcluded = (name) =>
                    excludeRes.some((re) => re.test(name));
                  // Name the failing check runs so the revise directive is
                  // actionable, and point at the suite's run logs. A failed
                  // run's `html_url` is the per-run logs page. In 'required'
                  // mode only failed runs whose name matches a required
                  // context count toward firing.
                  const failed = [];
                  try {
                    const runs = await github.paginate(
                      github.rest.checks.listForSuite, {
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        check_suite_id: suite.id,
                        per_page: 100,
                      });
                    for (const r of runs) {
                      const c = (r.conclusion || '').toLowerCase();
                      const name = r.name || r.check_name || '';
                      if (c !== 'failure' && c !== 'timed_out'
                          && c !== 'cancelled' && c !== 'action_required') {
                        continue;
                      }
                      if (isExcluded(name)) {
                        core.info('Failed check "' + name + '" matches a'
                          + ' revise-checks-exclude glob; ignoring it.');
                        continue;
                      }
                      if (requiredOnly && !requiredContexts.has(name)) {
                        continue;
                      }
                      failed.push({ name, url: r.html_url });
                    }
                  } catch (err) {
                    core.info('Could not list check runs for suite '
                      + suite.id + ': ' + err.message);
                  }
                  if (!failed.length) {
                    core.info('check_suite failure on ' + headBranch
                      + ' has no actionable failed check (' + mode
                      + ' mode); ignoring.');
                  } else {
                    const lines = ['A CI check failed on this pull'
                      + ' request. Fix the cause and push to the same branch.'];
                    lines.push('Failing checks:');
                    for (const f of failed) {
                      lines.push('- ' + f.name
                        + (f.url ? (' (' + f.url + ')') : ''));
                    }
                    const directive = lines.join('\n');
                    run = true;
                    reviewAutoRevise = true;
                    reviewPrNumber = prNumber;
                    reviseMarker = '<!-- sdd-execute:auto-revise-check -->';
                    ctx = {
                      trigger: 'revise',
                      item_type: 'pull_request',
                      item_number: prNumber,
                      directive,
                    };
                  }
                }
              }
            }

            // A fast-path implementation PR was merged. The wrapper detects
            // a merged PR whose head ref follows the `sdd/<n>-` convention
            // and whose referenced work-item is the tracking issue itself
            // (no parent_issue_url, no task sub-issue tree). On that match
            // the agent is invoked with `entry: 'fastpath-complete'` to run
            // step 8's completion sweep: `sdd:in-progress → sdd:done` on
            // the tracking issue, plus `needs-human` for the human's final
            // close. A merged full-path implementation PR (whose head ref
            // also follows `sdd/<task-id>-` but whose work-item is a task
            // sub-issue) is left to the existing flow: the merge closes
            // the task sub-issue via `Closes #<task>`, the `issues.closed`
            // event re-fires `sdd-dispatch`, and `sdd-execute`'s next idle
            // run (step 8) handles the feature-completion sweep. See
            // ADR 0012.
            if (event === 'pull_request' && payload.action === 'closed'
                && payload.pull_request.merged === true) {
              const headRef = payload.pull_request.head
                && payload.pull_request.head.ref || '';
              const headMatch = headRef.match(/^sdd\/(\d+)-/);
              if (headMatch) {
                const refNumber = parseInt(headMatch[1], 10);
                let isFastpath = false;
                try {
                  const { data } = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: refNumber,
                  });
                  // A tracking issue has no parent_issue_url. A task
                  // sub-issue has its Unit as parent. We treat
                  // "no parent and currently in-progress" as the
                  // fast-path completion signal.
                  const parentUrl = data.parent_issue_url || '';
                  const labels = (data.labels || []).map(
                    (l) => l.name || l);
                  const fastpathSignal = labels.includes('sdd:fastpath')
                    || labels.includes('sdd:fastpath-review')
                    || (!parentUrl
                      && labels.includes('sdd:in-progress')
                      && !labels.includes('sdd:dispatched'));
                  if (!parentUrl && fastpathSignal) {
                    isFastpath = true;
                  }
                } catch (err) {
                  core.info('Could not fetch ref #' + refNumber + ': '
                    + err.message);
                }
                if (isFastpath) {
                  run = true;
                  ctx = {
                    trigger: 'command',
                    entry: 'fastpath-complete',
                    item_type: 'issue',
                    item_number: refNumber,
                  };
                }
              }
            }

            // Tier gate. sdd-triage assigns each task sub-issue exactly one
            // model:* label. Every trigger this wrapper handles resolves to a
            // specific task sub-issue: directly for an issue event, through
            // the pull request's `Closes #<task>` reference for a
            // pull-request event, and through the aw_context input for a
            // workflow_dispatch from sdd-dispatch. This variant runs only
            // when that sub-issue carries the model:<TIER> label. This stops
            // the needless agent run, and its inference cost, on the two
            // tiers the trigger does not belong to. sdd-dispatch already
            // picks the matching variant per task (the matrix cell selects
            // the wrapper file by tier), so the tier gate here is a
            // defence-in-depth check that catches the corner where a task's
            // model:* label has changed between dispatch and pickup.
            //
            // The fast-path entries (`entry: 'fastpath'` from sdd-spec's
            // /approve, and `entry: 'fastpath-complete'` from a merged
            // implementation PR) bypass the tier gate: the work-item on a
            // fast-path entry is the tracking issue, which carries no
            // model:* label by design. The completion entry only moves
            // labels and posts a comment; the dispatch entry's tier match
            // is enforced by sdd-spec when it picks the variant to
            // workflow_dispatch.
            const fastpathEntry = ctx && (
              ctx.entry === 'fastpath' || ctx.entry === 'fastpath-complete');
            if (run && fastpathEntry && ctx.entry === 'fastpath') {
              // For the fastpath dispatch entry, the wrapper still confirms
              // that the variant matches the tier the plan comment names.
              // sdd-spec is expected to dispatch the matching variant
              // directly, but a misroute (operator-run workflow_dispatch
              // with a hand-supplied aw_context) is rejected here.
              const planTier = (ctx.tier || '').toLowerCase();
              if (planTier && planTier !== TIER) {
                core.info('Fast-path dispatch tier (' + planTier
                  + ') does not match this variant (' + TIER
                  + '); this variant skips it.');
                run = false;
                ctx = {};
              }
            }
            if (run && !fastpathEntry) {
              let taskIssue = 0;
              // A pull-request review/revise event on a fast-path
              // implementation PR identifies the tracking issue (not a
              // task sub-issue) via the head ref. The tracking issue
              // has no `model:*` label by design (ADR 0012). Mark this
              // case so the tier gate accepts a fast-path tracking
              // issue in lieu of a model-label match. `prBody` is
              // hoisted to outer scope so the tier-marker scan in the
              // label-check block can read it.
              let inferredFastpathFromPr = false;
              let prBody = '';
              if (ctx.item_type === 'issue') {
                taskIssue = ctx.item_number;
              } else if (ctx.item_type === 'pull_request') {
                // A pull_request_review_comment event carries the pull
                // request inline; an issue_comment event (a /revise comment)
                // does not, so fetch the pull request to read its body and
                // head ref.
                prBody = (payload.pull_request
                  && payload.pull_request.body) || '';
                let prHeadRef = (payload.pull_request
                  && payload.pull_request.head
                  && payload.pull_request.head.ref) || '';
                if (!prBody || !prHeadRef) {
                  try {
                    const { data } = await github.rest.pulls.get({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: ctx.item_number,
                    });
                    prBody = prBody || (data.body || '');
                    prHeadRef = prHeadRef
                      || (data.head && data.head.ref) || '';
                  } catch (err) {
                    core.info('Could not fetch pull request #'
                      + ctx.item_number + ': ' + err.message);
                  }
                }
                // The pull request body is the documented place for the task
                // sub-issue reference (`Closes #<task>`); prefer it.
                const m = prBody.match(
                  /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i);
                if (m) {
                  taskIssue = parseInt(m[1], 10);
                } else {
                  // Fall back to the head ref, which this agent encodes as
                  // `sdd/<task-id>-<slug>` for every implementation pull
                  // request it opens. This is robust against a future PR
                  // whose body omits `Closes #<task>` for any reason, and
                  // makes the route gate independent of body text. See #68.
                  // A fast-path PR encodes the tracking issue here (no
                  // `Closes #` reference exists, since the tracking issue
                  // stays open until a human closes it per ADR 0012).
                  const refMatch = prHeadRef.match(/^sdd\/(\d+)-/);
                  if (refMatch) {
                    taskIssue = parseInt(refMatch[1], 10);
                    inferredFastpathFromPr = true;
                  }
                }
              }
              let tierMatch = false;
              if (taskIssue) {
                try {
                  const { data } = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: taskIssue,
                  });
                  const labels = (data.labels || []).map(
                    (l) => l.name || l);
                  const hasTier = labels.includes('model:' + TIER);
                  // A fast-path tracking issue carries no `model:*` label
                  // (ADR 0012); identify it by the lifecycle labels and
                  // the absence of a parent. On a fast-path PR
                  // review/revise event, prefer the durable PR-body
                  // tier marker `[sdd-fastpath: tracking=<N>
                  // tier=<tier>]` written by sdd-execute on PR open
                  // (per sdd-execute-{tier}.md, step 5 fast-path
                  // paragraph). The marker is the strong routing
                  // signal: it pinpoints the tier so only the matching
                  // variant runs. When the marker is absent (e.g. a
                  // pre-marker PR), fall back to the
                  // fast-path-tracking-issue heuristic, which lets all
                  // three variants pass the route gate; the agent
                  // itself then noops on tier mismatch.
                  const isTracking = !data.parent_issue_url;
                  const isFastpathTracking = isTracking && (
                    labels.includes('sdd:fastpath')
                    || labels.includes('sdd:fastpath-review')
                    || labels.includes('sdd:in-progress')
                    || labels.includes('sdd:done'));
                  let fastpathTierMatch = false;
                  if (inferredFastpathFromPr && isFastpathTracking) {
                    const markerRe = new RegExp(
                      '\\[sdd-fastpath:\\s*tracking=\\d+\\s+'
                      + 'tier=(haiku|sonnet|opus)\\]', 'i');
                    const markerHit = (prBody || '').match(markerRe);
                    if (markerHit) {
                      fastpathTierMatch =
                        markerHit[1].toLowerCase() === TIER;
                    } else {
                      // Marker absent (e.g. an older fast-path PR
                      // opened before the marker convention landed).
                      // Resolve the owning tier from the stable
                      // metadata source: the execution plan comment on
                      // the tracking issue carries the `model:*` line.
                      // Walk the comments looking for the
                      // `[sdd-spec:fastpath-plan]` marker, pick the
                      // latest such comment (mirrors the wrapper's
                      // fastpath-approve job logic), and parse its
                      // `model:` line. Match this variant only when
                      // the resolved tier equals TIER. This keeps
                      // tier ownership stable for review/revise even
                      // without the PR-body marker.
                      const planMarker = '[sdd-spec:fastpath-plan]';
                      let planComment = null;
                      let page = 1;
                      try {
                        for (;;) {
                          const { data } = await github.rest.issues
                            .listComments({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: taskIssue,
                              per_page: 100,
                              page,
                            });
                          for (const c of data) {
                            if ((c.body || '').includes(planMarker)) {
                              if (!planComment
                                  || (new Date(c.created_at))
                                    > (new Date(planComment.created_at))) {
                                planComment = c;
                              }
                            }
                          }
                          if (data.length < 100) {
                            break;
                          }
                          page += 1;
                        }
                      } catch (planErr) {
                        core.info('Could not list comments on tracking'
                          + ' issue #' + taskIssue + ' for tier'
                          + ' resolution: ' + planErr.message);
                      }
                      if (planComment) {
                        const planTierHit = (planComment.body || '')
                          .match(
                            /model\s*:\s*(haiku|sonnet|opus)\b/i);
                        if (planTierHit) {
                          fastpathTierMatch =
                            planTierHit[1].toLowerCase() === TIER;
                        }
                      }
                    }
                  }
                  tierMatch = hasTier || fastpathTierMatch;
                } catch (err) {
                  core.info('Could not read labels for #' + taskIssue
                    + ': ' + err.message);
                }
              }
              if (!tierMatch) {
                core.info('Task is not the model:' + TIER
                  + ' tier; this variant skips it.');
                run = false;
                ctx = {};
              }
            }

            // Auto-revise loop bound (issue #128, extended for the failed
            // required-check path in issue #203). Only the owning tier reaches
            // here with run still true (the tier gate above cleared run for the
            // two non-owning variants), so the cap count and its side effects
            // happen exactly once per remediation trigger. Each remediation
            // path carries its own hidden marker (reviseMarker) so the
            // CHANGES_REQUESTED and failed-check budgets are independent. On
            // cap, apply needs-human and stop; SDD_MAX_REVIEW_ITERATIONS
            // defaults to 3.
            if (run && reviewAutoRevise && reviewPrNumber) {
              const MARKER = reviseMarker;
              const parsedMaxIters = parseInt(
                process.env.SDD_MAX_REVIEW_ITERATIONS || '3', 10);
              // Guard a non-numeric repo variable: a NaN cap would make
              // `priorIters >= maxIters` always false and silently disable
              // the auto-revise bound. Fall back to 3.
              const maxIters = Number.isFinite(parsedMaxIters)
                && parsedMaxIters > 0
                ? parsedMaxIters
                : 3;
              let priorIters = 0;
              let page = 1;
              try {
                for (;;) {
                  const { data } = await github.rest.issues.listComments({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: reviewPrNumber,
                    per_page: 100,
                    page,
                  });
                  for (const c of data) {
                    if ((c.body || '').includes(MARKER)) {
                      priorIters += 1;
                    }
                  }
                  if (data.length < 100) {
                    break;
                  }
                  page += 1;
                }
              } catch (err) {
                core.info('Could not list comments on PR #' + reviewPrNumber
                  + ' for iteration count: ' + err.message);
              }
              if (priorIters >= maxIters) {
                core.info('Auto-revise cap (' + maxIters + ') reached on PR #'
                  + reviewPrNumber + '; applying needs-human.');
                try {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: reviewPrNumber,
                    labels: ['needs-human'],
                  });
                } catch (err) {
                  core.info('Could not apply needs-human to PR #'
                    + reviewPrNumber + ': ' + err.message);
                }
                run = false;
                ctx = {};
              } else {
                // Post the hidden iteration marker so the next review counts
                // this cycle toward the cap.
                try {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: reviewPrNumber,
                    body: MARKER + '\nAuto-revise ' + (priorIters + 1)
                      + ' of ' + maxIters + '.',
                  });
                } catch (err) {
                  core.info('Could not post auto-revise marker on PR #'
                    + reviewPrNumber + ': ' + err.message);
                }
              }
            }

            core.setOutput('should_run', run ? 'true' : 'false');
            core.setOutput('aw_context', run ? JSON.stringify(ctx) : '');
