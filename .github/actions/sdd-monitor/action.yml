name: sdd-monitor
description: >
  Scheduled backstop that nudges armed-but-idle tracking issues by posting
  /dispatch when a ready set exists but the cascade stalled (ADR 0006). Walks
  open PRs to their tracker, computes the ready set, and debounces. Also
  recovers tasks left stranded by a pre-agent execute failure (cancelled or
  activation-stage, issue #201): re-dispatches an sdd:ready / sdd:in-progress
  task that has no open sdd/ PR and no in-flight run, then escalates to
  needs-human after a bounded number of attempts. Extracted verbatim
  (ADR 0015). The caller mints the App token and passes it as github-token;
  the in-flight run-status gate uses a separate runs-token (the workflow
  GITHUB_TOKEN), so the App installation never needs the Actions permission.

inputs:
  github-token:
    description: >
      App-installation token for PR/issue reads and the /dispatch comment
      (needs pull-requests:read + issues:write). Does NOT need actions:read —
      the run-status gate uses runs-token instead.
    required: true
  runs-token:
    description: >
      Workflow GITHUB_TOKEN (actions:read) used only for the in-flight
      run-status gate (listWorkflowRunsForRepo). Kept separate from the App
      token so the monitor does not require the Actions permission on the App
      installation — requesting an ungranted scope 422s the whole token mint
      (issue #249).
    required: true
  debounce-min:
    description: 'Debounce window in minutes; empty falls back to the script default.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    # In-flight gate, on the workflow GITHUB_TOKEN. If any sdd-execute-* run is
    # in_progress or queued in this repo, defer the pass (the main step is
    # gated on this output). Run via runs-token, NOT the App token: only the
    # Actions API (listWorkflowRunsForRepo) needs actions:read, and routing it
    # through GITHUB_TOKEN (which carries actions:read from the job
    # permissions) lets the App token stay scoped to pull-requests:read +
    # issues:write — so a consumer whose App install lacks the Actions
    # permission no longer 422s at mint (issue #249).
    - name: In-flight gate
      id: inflight
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        github-token: ${{ inputs.runs-token }}
        script: |
            const { owner, repo } = context.repo;
            // The dispatch wrapper's per-task-per-tier concurrency group will
            // cancel an in-flight cell when a new /dispatch fans out onto the
            // same task, so even a single stacked /dispatch can kill
            // productive work. The conservative repo-wide gate is the simplest
            // way to make Tier 1 storm-proof; the cron backstop reruns every
            // ten minutes so a missed window is recovered on the next pass.
            const variantNames = [
              'sdd-execute-haiku',
              'sdd-execute-sonnet',
              'sdd-execute-opus',
            ];
            for (const status of ['in_progress', 'queued']) {
              for (const wf of variantNames) {
                let runs = [];
                try {
                  runs = await github.paginate(
                    github.rest.actions.listWorkflowRunsForRepo,
                    { owner, repo, status, per_page: 50 });
                } catch (err) {
                  core.info(
                    'Could not list ' + status + ' runs: ' + err.message
                    + '; treating as in-flight to stay safe.');
                  core.setOutput('in_flight', 'true');
                  return;
                }
                const hit = runs.find((r) => r.name === wf);
                if (hit) {
                  core.info(
                    'In-flight gate: ' + wf + ' run #' + hit.id + ' is '
                    + status + '; deferring monitor pass.');
                  core.setOutput('in_flight', 'true');
                  return;
                }
              }
            }
            core.setOutput('in_flight', 'false');

    - name: Nudge armed-but-idle trackers
      # Deferred when the in-flight gate found a live sdd-execute-* run.
      if: steps.inflight.outputs.in_flight != 'true'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        SDD_MONITOR_DEBOUNCE_MIN: ${{ inputs.debounce-min }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
            // The job-level if: gate already ensured SDD_MONITOR == '1';
            // if execution reaches this script the monitor is enabled. The
            // preceding step's in-flight gate has already cleared (no
            // sdd-execute-* run in_progress or queued), so any deps-closed
            // open task with no PR and no run is genuinely stranded.

            // Shared parent walk (task -> Unit -> tracker via GraphQL
            // Issue.parent), one source of truth with sdd-status (#254).
            // GITHUB_ACTION_PATH is this action's dir; '..' reaches the
            // actions/ dir, then shared/parent-walk.js. The fail-closed
            // contract is documented in the module: a lookup error
            // rethrows and the caller treats it as "assume in flight".
            const { walkToTracker } = require(
              require('path').join(
                process.env.GITHUB_ACTION_PATH, '..', 'shared',
                'parent-walk.js'));

            const { owner, repo } = context.repo;
            // Default to 5 minutes; treat a missing, empty, or
            // non-numeric SDD_MONITOR_DEBOUNCE_MIN as "use the default".
            // parseInt('', 10) and parseInt('abc', 10) both return NaN,
            // and Math.max(1, NaN) is NaN — without this guard a typo
            // in the repo var silently disables the debounce gate
            // (every `ageMs < NaN` is false).
            const parsedDebounce = parseInt(
              process.env.SDD_MONITOR_DEBOUNCE_MIN || '', 10);
            const debounceMin =
              Number.isFinite(parsedDebounce) && parsedDebounce > 0
                ? parsedDebounce
                : 5;
            const debounceMs = debounceMin * 60 * 1000;

            // Candidate trackers: open issues carrying sdd:dispatched, not
            // carrying needs-human or sdd:done. The search index can lag a
            // label change by a few seconds; one pass picks up the lag on
            // the next firing, so no retry loop is needed here.
            const trackerQuery =
              'repo:' + owner + '/' + repo
              + ' is:issue is:open label:sdd:dispatched'
              + ' -label:needs-human -label:sdd:done';
            let trackers = [];
            try {
              const resp = await github.paginate(
                github.rest.search.issuesAndPullRequests,
                { q: trackerQuery, per_page: 100 });
              trackers = resp.filter((it) => !it.pull_request);
            } catch (err) {
              core.info(
                'Tracker search failed: ' + err.message + '; nothing to do.');
              return;
            }
            if (!trackers.length) {
              core.info('No active sdd:dispatched trackers; nothing to do.');
              return;
            }

            core.info(
              'Evaluating ' + trackers.length + ' active tracker(s).');

            // Per-tracker armed-but-idle check.
            for (const tracker of trackers) {
              const trackerNum = tracker.number;

              // Debounce against the most recent /dispatch comment on
              // this tracker, regardless of author. A monitor-issued
              // dispatch and an operator-issued dispatch both occupy
              // the same rate-limit slot. The check walks comments from
              // newest to oldest and stops at the first /dispatch hit.
              let comments = [];
              try {
                comments = await github.paginate(
                  github.rest.issues.listComments,
                  { owner, repo, issue_number: trackerNum, per_page: 100 });
              } catch (err) {
                core.info(
                  '#' + trackerNum + ': could not list comments ('
                  + err.message + '); skipping.');
                continue;
              }
              const now = Date.now();
              let recentDispatch = null;
              for (let i = comments.length - 1; i >= 0; i--) {
                const c = comments[i];
                const body = (c.body || '').trimStart();
                const isDispatch =
                  body === '/dispatch'
                  || body.startsWith('/dispatch ')
                  || body.startsWith('/dispatch\n')
                  || body.startsWith('/dispatch\r\n')
                  || body.startsWith('/dispatch\t');
                if (isDispatch) {
                  recentDispatch = c;
                  break;
                }
              }
              if (recentDispatch) {
                const ageMs = now - Date.parse(recentDispatch.created_at);
                if (ageMs < debounceMs) {
                  core.info(
                    '#' + trackerNum + ': last /dispatch was '
                    + Math.round(ageMs / 1000) + 's ago '
                    + '(< ' + debounceMin + 'm debounce); skipping.');
                  continue;
                }
              }

              // Open sdd/ implementation PR check. An open PR for any task
              // under this tracker means a layer is in flight via the PR
              // side of the cascade; do not nudge. The dispatch wrapper
              // re-fires on PR close, so this case will be re-evaluated
              // then.
              let openPrs = [];
              try {
                openPrs = await github.paginate(
                  github.rest.pulls.list,
                  { owner, repo, state: 'open', per_page: 100 });
              } catch (err) {
                core.info(
                  '#' + trackerNum + ': could not list open PRs ('
                  + err.message + '); skipping.');
                continue;
              }
              const sddPrs = openPrs.filter(
                (p) => (p.head && p.head.ref || '').startsWith('sdd/'));
              let prInFlight = false;
              let walkFailed = false;
              for (const pr of sddPrs) {
                // The sdd/ branch carries the task issue number as the
                // first numeric segment after the prefix (ADR 0006). Map
                // the task back to its tracker by walking two parent
                // hops; if any open sdd/ PR rolls up to this tracker the
                // layer is in flight.
                const m = (pr.head.ref || '').match(/^sdd\/(\d+)-/);
                if (!m) { continue; }
                const taskNum = parseInt(m[1], 10);
                // Fail closed: if the upward walk cannot be completed
                // (a seed or GraphQL lookup error, the exact failure #133
                // describes), we cannot prove this PR is unrelated to the
                // tracker. Treat the unresolved walk as "assume in flight"
                // and skip the nudge for this tracker only — never nudge a
                // tracker we could not rule out as in flight.
                let trackerOfTask;
                try {
                  trackerOfTask =
                    await walkToTracker(github, owner, repo, taskNum);
                } catch (err) {
                  core.info(
                    '#' + trackerNum + ': parent walk for PR task #'
                    + taskNum + ' failed (' + err.message
                    + '); assuming in flight and skipping.');
                  walkFailed = true;
                  break;
                }
                if (trackerOfTask === trackerNum) {
                  prInFlight = true;
                  break;
                }
              }
              if (walkFailed) { continue; }
              if (prInFlight) {
                core.info(
                  '#' + trackerNum + ': an open sdd/ PR rolls up to this '
                  + 'tracker; not armed-but-idle.');
                continue;
              }

              // Task numbers carrying an open sdd/ implementation PR.
              // A task whose PR is open has a layer in flight on the
              // pull-request side of the cascade, so it is never
              // stranded even when it still carries sdd:ready /
              // sdd:in-progress. sddPrs was already collected for the
              // in-flight rollup guard above.
              const tasksWithOpenPr = new Set();
              for (const pr of sddPrs) {
                const m = (pr.head.ref || '').match(/^sdd\/(\d+)-/);
                if (m) { tasksWithOpenPr.add(parseInt(m[1], 10)); }
              }

              // Walk the sub-issue tree: tracker -> Unit -> task. Find
              // open task sub-issues whose every `blocked by #<N>`
              // dependency is closed. Tier 1 only needs the count; the
              // dispatch wrapper recomputes the ready set authoritatively
              // when it picks up our /dispatch comment.
              //
              // Stranded-task recovery (issue #201): an sdd-execute run
              // that dies BEFORE its agent job — cancelled by concurrency
              // or failing in activation — leaves its task at sdd:ready /
              // sdd:in-progress with no PR and no run, and files no
              // failure issue (report-failure-as-issue only covers an
              // agent-stage failure). The repo-wide in-flight gate in the
              // preceding step already proved no sdd-execute-* run is
              // in_progress or queued, so any deps-closed open task labelled
              // sdd:ready or
              // sdd:in-progress with no open sdd/ PR has been silently
              // dropped. Collect those as stranded so the recovery tier
              // below re-dispatches them (bounded) or escalates.
              let readyCount = 0;
              const strandedTasks = [];
              let units = [];
              try {
                units = await github.paginate(
                  'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                  { owner, repo, issue_number: trackerNum, per_page: 100 });
              } catch (err) {
                core.info(
                  '#' + trackerNum + ': could not list Unit sub-issues ('
                  + err.message + '); skipping.');
                continue;
              }
              for (const unit of units) {
                let tasks = [];
                try {
                  tasks = await github.paginate(
                    'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                    { owner, repo, issue_number: unit.number, per_page: 100 });
                } catch (err) {
                  core.info(
                    '#' + trackerNum + ': could not list tasks under Unit #'
                    + unit.number + ' (' + err.message + '); skipping unit.');
                  continue;
                }
                for (const task of tasks) {
                  if (task.state !== 'open') { continue; }
                  const body = task.body || '';
                  const blockerNums = [
                    ...new Set(
                      [...body.matchAll(/\bblocked by #(\d+)\b/g)].map(
                        (m) => parseInt(m[1], 10))),
                  ];
                  let allClosed = true;
                  for (const b of blockerNums) {
                    try {
                      const got = await github.rest.issues.get({
                        owner, repo, issue_number: b,
                      });
                      if (got.data.pull_request) { continue; }
                      if (got.data.state !== 'closed') {
                        allClosed = false;
                        break;
                      }
                    } catch (err) {
                      core.info(
                        '#' + trackerNum + ': could not read blocker #' + b
                        + ' for task #' + task.number
                        + ' (' + err.message
                        + '); treating as still blocked.');
                      allClosed = false;
                      break;
                    }
                  }
                  if (allClosed) {
                    readyCount += 1;
                    // A deps-closed open task counts as stranded when it
                    // already carries a lifecycle label that means "a run
                    // should be live" (sdd:ready / sdd:in-progress) yet
                    // has no open sdd/ PR. With the repo-wide in-flight
                    // gate already cleared, that task has no run and no PR:
                    // a pre-agent execute failure dropped it silently.
                    const labelNames = (task.labels || []).map(
                      (l) => (typeof l === 'string' ? l : l.name));
                    const looksDispatched =
                      labelNames.includes('sdd:ready')
                      || labelNames.includes('sdd:in-progress');
                    if (looksDispatched
                        && !tasksWithOpenPr.has(task.number)) {
                      strandedTasks.push(task.number);
                    }
                  }
                }
              }

              if (readyCount === 0 && strandedTasks.length === 0) {
                core.info(
                  '#' + trackerNum + ': no ready or stranded open tasks; '
                  + 'not armed-but-idle.');
                continue;
              }

              // Stranded-task recovery tier (issue #201). When at least
              // one task is stranded, count this tracker's prior monitor
              // re-dispatch audit lines to bound the retry. The audit line
              // posted below is the durable attempt counter — it survives
              // across monitor passes and is visible to operators. After
              // MAX_REDISPATCH attempts the tracker is escalated to
              // needs-human instead of being re-dispatched again, so a
              // task that cannot recover does not loop forever.
              const MAX_REDISPATCH = 3;
              const REDISPATCH_MARKER = 'sdd-monitor: re-dispatching stranded';
              if (strandedTasks.length) {
                let priorAttempts = 0;
                for (const c of comments) {
                  if ((c.body || '').includes(REDISPATCH_MARKER)) {
                    priorAttempts += 1;
                  }
                }
                if (priorAttempts >= MAX_REDISPATCH) {
                  // Escalate. Apply needs-human (a marker label, not a
                  // lifecycle transition) and post a digest so an operator
                  // can intervene. The App token carries issues:write; the
                  // monitor's own GITHUB_TOKEN is issues:read only.
                  const escalateBody =
                    'sdd-monitor: stranded task'
                    + (strandedTasks.length === 1 ? '' : 's') + ' '
                    + strandedTasks.map((n) => '#' + n).join(', ')
                    + ' on #' + trackerNum + ' did not recover after '
                    + priorAttempts + ' re-dispatch attempt'
                    + (priorAttempts === 1 ? '' : 's')
                    + '; applying needs-human for operator review.';
                  try {
                    await github.rest.issues.addLabels({
                      owner, repo, issue_number: trackerNum,
                      labels: ['needs-human'],
                    });
                  } catch (err) {
                    core.warning(
                      '#' + trackerNum + ': failed to apply needs-human: '
                      + err.message);
                  }
                  try {
                    await github.rest.issues.createComment({
                      owner, repo, issue_number: trackerNum,
                      body: escalateBody,
                    });
                  } catch (err) {
                    core.warning(
                      '#' + trackerNum + ': failed to post escalation: '
                      + err.message);
                  }
                  core.info(
                    '#' + trackerNum + ': escalated stranded task'
                    + (strandedTasks.length === 1 ? '' : 's') + ' to '
                    + 'needs-human after ' + priorAttempts + ' attempt'
                    + (priorAttempts === 1 ? '' : 's') + '.');
                  continue;
                }

                // Re-dispatch. The body's first token is /dispatch so the
                // dispatch wrapper recomputes the ready set and re-fires
                // /execute on the stranded task(s); the audit line names
                // them and records the attempt number so the recovery is
                // observable, not silent.
                const recoverBody =
                  '/dispatch\n\n'
                  + REDISPATCH_MARKER + ' task'
                  + (strandedTasks.length === 1 ? '' : 's') + ' '
                  + strandedTasks.map((n) => '#' + n).join(', ')
                  + ' on #' + trackerNum + ' (no PR, no in-flight run; '
                  + 'attempt ' + (priorAttempts + 1) + ' of '
                  + MAX_REDISPATCH + ').';
                try {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: trackerNum, body: recoverBody,
                  });
                  core.info(
                    '#' + trackerNum + ': re-dispatched stranded task'
                    + (strandedTasks.length === 1 ? '' : 's') + ' '
                    + strandedTasks.join(', ') + ' (attempt '
                    + (priorAttempts + 1) + '/' + MAX_REDISPATCH + ').');
                } catch (err) {
                  core.warning(
                    '#' + trackerNum + ': failed to post re-dispatch: '
                    + err.message);
                }
                continue;
              }

              // Dispatch. The body's first token is `/dispatch` so the
              // dispatch wrapper's command match fires; the audit prefix
              // sits on a following line so operators see the action in
              // the timeline. The combined comment is one writeable
              // event, which keeps the timeline cleaner than a two-step
              // (audit then dispatch) sequence.
              const auditBody =
                '/dispatch\n\n'
                + 'sdd-monitor: armed-but-idle on #' + trackerNum
                + ' with ' + readyCount + ' task'
                + (readyCount === 1 ? '' : 's')
                + ' ready; dispatching.';
              try {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: trackerNum, body: auditBody,
                });
                core.info(
                  '#' + trackerNum + ': posted monitor /dispatch ('
                  + readyCount + ' ready task'
                  + (readyCount === 1 ? '' : 's') + ').');
              } catch (err) {
                core.warning(
                  '#' + trackerNum + ': failed to post /dispatch: '
                  + err.message);
              }
            }
