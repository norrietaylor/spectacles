name: sdd-monitor
description: >
  Scheduled backstop that nudges armed-but-idle tracking issues by posting
  /dispatch when a ready set exists but the cascade stalled (ADR 0006). Walks
  open PRs to their tracker, computes the ready set, and debounces. Also
  recovers tasks left stranded by a pre-agent execute failure (cancelled or
  activation-stage, issue #201): re-dispatches an sdd:ready / sdd:in-progress
  task that has no open sdd/ PR and no in-flight run, then escalates to
  needs-human after a bounded number of attempts. Also detects a CodeRabbit
  review stall on an open sdd/ PR (issue #257): bounded "@coderabbitai
  review" nudges per head sha, then needs-human. Extracted verbatim
  (ADR 0015). The caller mints the App token and passes it as github-token;
  the in-flight run-status gate uses a separate runs-token (the workflow
  GITHUB_TOKEN), so the App installation never needs the Actions permission.

inputs:
  github-token:
    description: >
      App-installation token for PR/issue reads and the /dispatch comment
      (needs pull-requests:read + issues:write). Does NOT need actions:read —
      the run-status gate uses runs-token instead.
    required: true
  runs-token:
    description: >
      Workflow GITHUB_TOKEN used for the in-flight run-status gate
      (listWorkflowRunsForRepo, actions:read) and the CodeRabbit config
      presence probe (getContent, contents:read). Kept separate from the App
      token so the monitor does not require the Actions or Contents
      permission on the App installation — requesting an ungranted scope
      422s the whole token mint (issue #249).
    required: true
  debounce-min:
    description: 'Debounce window in minutes; empty falls back to the script default.'
    required: false
    default: ''
  coderabbit:
    description: >
      CodeRabbit stall-detection toggle (SDD_CODERABBIT, issue #257). '1'
      force-enables, '0' force-disables; empty (the default) auto-detects
      from a .coderabbit.yaml / .coderabbit.yml at the repository root.
    required: false
    default: ''
  coderabbit-stall-min:
    description: >
      Minutes an open non-draft sdd/ PR's head commit must age with no
      review or comment from coderabbitai[bot] before the PR counts as
      stalled; empty falls back to the script default.
    required: false
    default: ''
  coderabbit-nudge-max:
    description: >
      Maximum "@coderabbitai review" nudge comments per head sha before the
      monitor escalates the PR to needs-human; empty falls back to the
      script default.
    required: false
    default: ''
  app-id:
    description: >
      Numeric id of the GitHub App whose installation token is passed as
      github-token. When set, the CodeRabbit nudge/escalation marker budget
      counts only comments performed via this App, so a marker string
      pasted by any other commenter cannot burn the nudge budget or
      suppress escalation. Empty falls back to author-blind counting.
    required: false
    default: ''

runs:
  using: composite
  steps:
    # In-flight gate, on the workflow GITHUB_TOKEN. If any sdd-execute-* run is
    # in_progress or queued in this repo, defer the pass (the main step is
    # gated on this output). Run via runs-token, NOT the App token: only the
    # Actions API (listWorkflowRunsForRepo) needs actions:read, and routing it
    # through GITHUB_TOKEN (which carries actions:read from the job
    # permissions) lets the App token stay scoped to pull-requests:read +
    # issues:write — so a consumer whose App install lacks the Actions
    # permission no longer 422s at mint (issue #249).
    - name: In-flight gate
      id: inflight
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        github-token: ${{ inputs.runs-token }}
        script: |
            const { owner, repo } = context.repo;
            // The dispatch wrapper's per-task-per-tier concurrency group will
            // cancel an in-flight cell when a new /dispatch fans out onto the
            // same task, so even a single stacked /dispatch can kill
            // productive work. The conservative repo-wide gate is the simplest
            // way to make Tier 1 storm-proof; the cron backstop reruns every
            // ten minutes so a missed window is recovered on the next pass.
            const variantNames = [
              'sdd-execute-haiku',
              'sdd-execute-sonnet',
              'sdd-execute-opus',
            ];
            for (const status of ['in_progress', 'queued']) {
              for (const wf of variantNames) {
                let runs = [];
                try {
                  runs = await github.paginate(
                    github.rest.actions.listWorkflowRunsForRepo,
                    { owner, repo, status, per_page: 50 });
                } catch (err) {
                  core.info(
                    'Could not list ' + status + ' runs: ' + err.message
                    + '; treating as in-flight to stay safe.');
                  core.setOutput('in_flight', 'true');
                  return;
                }
                const hit = runs.find((r) => r.name === wf);
                if (hit) {
                  core.info(
                    'In-flight gate: ' + wf + ' run #' + hit.id + ' is '
                    + status + '; deferring monitor pass.');
                  core.setOutput('in_flight', 'true');
                  return;
                }
              }
            }
            core.setOutput('in_flight', 'false');

    - name: Nudge armed-but-idle trackers
      # Deferred when the in-flight gate found a live sdd-execute-* run.
      if: steps.inflight.outputs.in_flight != 'true'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        SDD_MONITOR_DEBOUNCE_MIN: ${{ inputs.debounce-min }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
            // The job-level if: gate already ensured SDD_MONITOR == '1';
            // if execution reaches this script the monitor is enabled. The
            // preceding step's in-flight gate has already cleared (no
            // sdd-execute-* run in_progress or queued), so any deps-closed
            // open task with no PR and no run is genuinely stranded.

            const { owner, repo } = context.repo;
            // Default to 5 minutes; treat a missing, empty, or
            // non-numeric SDD_MONITOR_DEBOUNCE_MIN as "use the default".
            // parseInt('', 10) and parseInt('abc', 10) both return NaN,
            // and Math.max(1, NaN) is NaN — without this guard a typo
            // in the repo var silently disables the debounce gate
            // (every `ageMs < NaN` is false).
            const parsedDebounce = parseInt(
              process.env.SDD_MONITOR_DEBOUNCE_MIN || '', 10);
            const debounceMin =
              Number.isFinite(parsedDebounce) && parsedDebounce > 0
                ? parsedDebounce
                : 5;
            const debounceMs = debounceMin * 60 * 1000;

            // Candidate trackers: open issues carrying sdd:dispatched, not
            // carrying needs-human or sdd:done. The search index can lag a
            // label change by a few seconds; one pass picks up the lag on
            // the next firing, so no retry loop is needed here.
            const trackerQuery =
              'repo:' + owner + '/' + repo
              + ' is:issue is:open label:sdd:dispatched'
              + ' -label:needs-human -label:sdd:done';
            let trackers = [];
            try {
              const resp = await github.paginate(
                github.rest.search.issuesAndPullRequests,
                { q: trackerQuery, per_page: 100 });
              trackers = resp.filter((it) => !it.pull_request);
            } catch (err) {
              core.info(
                'Tracker search failed: ' + err.message + '; nothing to do.');
              return;
            }
            if (!trackers.length) {
              core.info('No active sdd:dispatched trackers; nothing to do.');
              return;
            }

            core.info(
              'Evaluating ' + trackers.length + ' active tracker(s).');

            // Per-tracker armed-but-idle check.
            for (const tracker of trackers) {
              const trackerNum = tracker.number;

              // Debounce against the most recent /dispatch comment on
              // this tracker, regardless of author. A monitor-issued
              // dispatch and an operator-issued dispatch both occupy
              // the same rate-limit slot. The check walks comments from
              // newest to oldest and stops at the first /dispatch hit.
              let comments = [];
              try {
                comments = await github.paginate(
                  github.rest.issues.listComments,
                  { owner, repo, issue_number: trackerNum, per_page: 100 });
              } catch (err) {
                core.info(
                  '#' + trackerNum + ': could not list comments ('
                  + err.message + '); skipping.');
                continue;
              }
              const now = Date.now();
              let recentDispatch = null;
              for (let i = comments.length - 1; i >= 0; i--) {
                const c = comments[i];
                const body = (c.body || '').trimStart();
                const isDispatch =
                  body === '/dispatch'
                  || body.startsWith('/dispatch ')
                  || body.startsWith('/dispatch\n')
                  || body.startsWith('/dispatch\r\n')
                  || body.startsWith('/dispatch\t');
                if (isDispatch) {
                  recentDispatch = c;
                  break;
                }
              }
              if (recentDispatch) {
                const ageMs = now - Date.parse(recentDispatch.created_at);
                if (ageMs < debounceMs) {
                  core.info(
                    '#' + trackerNum + ': last /dispatch was '
                    + Math.round(ageMs / 1000) + 's ago '
                    + '(< ' + debounceMin + 'm debounce); skipping.');
                  continue;
                }
              }

              // Open sdd/ implementation PR check. An open PR for any task
              // under this tracker means a layer is in flight via the PR
              // side of the cascade; do not nudge. The dispatch wrapper
              // re-fires on PR close, so this case will be re-evaluated
              // then.
              let openPrs = [];
              try {
                openPrs = await github.paginate(
                  github.rest.pulls.list,
                  { owner, repo, state: 'open', per_page: 100 });
              } catch (err) {
                core.info(
                  '#' + trackerNum + ': could not list open PRs ('
                  + err.message + '); skipping.');
                continue;
              }
              const sddPrs = openPrs.filter(
                (p) => (p.head && p.head.ref || '').startsWith('sdd/'));
              let prInFlight = false;
              let walkFailed = false;
              for (const pr of sddPrs) {
                // The sdd/ branch carries the task issue number as the
                // first numeric segment after the prefix (ADR 0006). Map
                // the task back to its tracker by walking two parent
                // hops; if any open sdd/ PR rolls up to this tracker the
                // layer is in flight.
                const m = (pr.head.ref || '').match(/^sdd\/(\d+)-/);
                if (!m) { continue; }
                const taskNum = parseInt(m[1], 10);
                // Fail closed: if the upward walk cannot be completed
                // (a seed or GraphQL lookup error, the exact failure #133
                // describes), we cannot prove this PR is unrelated to the
                // tracker. Treat the unresolved walk as "assume in flight"
                // and skip the nudge for this tracker only — never nudge a
                // tracker we could not rule out as in flight.
                let trackerOfTask;
                try {
                  trackerOfTask =
                    await walkToTracker(github, owner, repo, taskNum);
                } catch (err) {
                  core.info(
                    '#' + trackerNum + ': parent walk for PR task #'
                    + taskNum + ' failed (' + err.message
                    + '); assuming in flight and skipping.');
                  walkFailed = true;
                  break;
                }
                if (trackerOfTask === trackerNum) {
                  prInFlight = true;
                  break;
                }
              }
              if (walkFailed) { continue; }
              if (prInFlight) {
                core.info(
                  '#' + trackerNum + ': an open sdd/ PR rolls up to this '
                  + 'tracker; not armed-but-idle.');
                continue;
              }

              // Task numbers carrying an open sdd/ implementation PR.
              // A task whose PR is open has a layer in flight on the
              // pull-request side of the cascade, so it is never
              // stranded even when it still carries sdd:ready /
              // sdd:in-progress. sddPrs was already collected for the
              // in-flight rollup guard above.
              const tasksWithOpenPr = new Set();
              for (const pr of sddPrs) {
                const m = (pr.head.ref || '').match(/^sdd\/(\d+)-/);
                if (m) { tasksWithOpenPr.add(parseInt(m[1], 10)); }
              }

              // Walk the sub-issue tree: tracker -> Unit -> task. Find
              // open task sub-issues whose every `blocked by #<N>`
              // dependency is closed. Tier 1 only needs the count; the
              // dispatch wrapper recomputes the ready set authoritatively
              // when it picks up our /dispatch comment.
              //
              // Stranded-task recovery (issue #201): an sdd-execute run
              // that dies BEFORE its agent job — cancelled by concurrency
              // or failing in activation — leaves its task at sdd:ready /
              // sdd:in-progress with no PR and no run, and files no
              // failure issue (report-failure-as-issue only covers an
              // agent-stage failure). The repo-wide in-flight gate in the
              // preceding step already proved no sdd-execute-* run is
              // in_progress or queued, so any deps-closed open task labelled
              // sdd:ready or
              // sdd:in-progress with no open sdd/ PR has been silently
              // dropped. Collect those as stranded so the recovery tier
              // below re-dispatches them (bounded) or escalates.
              let readyCount = 0;
              const strandedTasks = [];
              let units = [];
              try {
                units = await github.paginate(
                  'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                  { owner, repo, issue_number: trackerNum, per_page: 100 });
              } catch (err) {
                core.info(
                  '#' + trackerNum + ': could not list Unit sub-issues ('
                  + err.message + '); skipping.');
                continue;
              }
              for (const unit of units) {
                let tasks = [];
                try {
                  tasks = await github.paginate(
                    'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                    { owner, repo, issue_number: unit.number, per_page: 100 });
                } catch (err) {
                  core.info(
                    '#' + trackerNum + ': could not list tasks under Unit #'
                    + unit.number + ' (' + err.message + '); skipping unit.');
                  continue;
                }
                for (const task of tasks) {
                  if (task.state !== 'open') { continue; }
                  const body = task.body || '';
                  const blockerNums = [
                    ...new Set(
                      [...body.matchAll(/\bblocked by #(\d+)\b/g)].map(
                        (m) => parseInt(m[1], 10))),
                  ];
                  let allClosed = true;
                  for (const b of blockerNums) {
                    try {
                      const got = await github.rest.issues.get({
                        owner, repo, issue_number: b,
                      });
                      if (got.data.pull_request) { continue; }
                      if (got.data.state !== 'closed') {
                        allClosed = false;
                        break;
                      }
                    } catch (err) {
                      core.info(
                        '#' + trackerNum + ': could not read blocker #' + b
                        + ' for task #' + task.number
                        + ' (' + err.message
                        + '); treating as still blocked.');
                      allClosed = false;
                      break;
                    }
                  }
                  if (allClosed) {
                    readyCount += 1;
                    // A deps-closed open task counts as stranded when it
                    // already carries a lifecycle label that means "a run
                    // should be live" (sdd:ready / sdd:in-progress) yet
                    // has no open sdd/ PR. With the repo-wide in-flight
                    // gate already cleared, that task has no run and no PR:
                    // a pre-agent execute failure dropped it silently.
                    const labelNames = (task.labels || []).map(
                      (l) => (typeof l === 'string' ? l : l.name));
                    const looksDispatched =
                      labelNames.includes('sdd:ready')
                      || labelNames.includes('sdd:in-progress');
                    if (looksDispatched
                        && !tasksWithOpenPr.has(task.number)) {
                      strandedTasks.push(task.number);
                    }
                  }
                }
              }

              if (readyCount === 0 && strandedTasks.length === 0) {
                core.info(
                  '#' + trackerNum + ': no ready or stranded open tasks; '
                  + 'not armed-but-idle.');
                continue;
              }

              // Stranded-task recovery tier (issue #201). When at least
              // one task is stranded, count this tracker's prior monitor
              // re-dispatch audit lines to bound the retry. The audit line
              // posted below is the durable attempt counter — it survives
              // across monitor passes and is visible to operators. After
              // MAX_REDISPATCH attempts the tracker is escalated to
              // needs-human instead of being re-dispatched again, so a
              // task that cannot recover does not loop forever.
              const MAX_REDISPATCH = 3;
              const REDISPATCH_MARKER = 'sdd-monitor: re-dispatching stranded';
              if (strandedTasks.length) {
                let priorAttempts = 0;
                for (const c of comments) {
                  if ((c.body || '').includes(REDISPATCH_MARKER)) {
                    priorAttempts += 1;
                  }
                }
                if (priorAttempts >= MAX_REDISPATCH) {
                  // Escalate. Apply needs-human (a marker label, not a
                  // lifecycle transition) and post a digest so an operator
                  // can intervene. The App token carries issues:write; the
                  // monitor's own GITHUB_TOKEN is issues:read only.
                  const escalateBody =
                    'sdd-monitor: stranded task'
                    + (strandedTasks.length === 1 ? '' : 's') + ' '
                    + strandedTasks.map((n) => '#' + n).join(', ')
                    + ' on #' + trackerNum + ' did not recover after '
                    + priorAttempts + ' re-dispatch attempt'
                    + (priorAttempts === 1 ? '' : 's')
                    + '; applying needs-human for operator review.';
                  try {
                    await github.rest.issues.addLabels({
                      owner, repo, issue_number: trackerNum,
                      labels: ['needs-human'],
                    });
                  } catch (err) {
                    core.warning(
                      '#' + trackerNum + ': failed to apply needs-human: '
                      + err.message);
                  }
                  try {
                    await github.rest.issues.createComment({
                      owner, repo, issue_number: trackerNum,
                      body: escalateBody,
                    });
                  } catch (err) {
                    core.warning(
                      '#' + trackerNum + ': failed to post escalation: '
                      + err.message);
                  }
                  core.info(
                    '#' + trackerNum + ': escalated stranded task'
                    + (strandedTasks.length === 1 ? '' : 's') + ' to '
                    + 'needs-human after ' + priorAttempts + ' attempt'
                    + (priorAttempts === 1 ? '' : 's') + '.');
                  continue;
                }

                // Re-dispatch. The body's first token is /dispatch so the
                // dispatch wrapper recomputes the ready set and re-fires
                // /execute on the stranded task(s); the audit line names
                // them and records the attempt number so the recovery is
                // observable, not silent.
                const recoverBody =
                  '/dispatch\n\n'
                  + REDISPATCH_MARKER + ' task'
                  + (strandedTasks.length === 1 ? '' : 's') + ' '
                  + strandedTasks.map((n) => '#' + n).join(', ')
                  + ' on #' + trackerNum + ' (no PR, no in-flight run; '
                  + 'attempt ' + (priorAttempts + 1) + ' of '
                  + MAX_REDISPATCH + ').';
                try {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: trackerNum, body: recoverBody,
                  });
                  core.info(
                    '#' + trackerNum + ': re-dispatched stranded task'
                    + (strandedTasks.length === 1 ? '' : 's') + ' '
                    + strandedTasks.join(', ') + ' (attempt '
                    + (priorAttempts + 1) + '/' + MAX_REDISPATCH + ').');
                } catch (err) {
                  core.warning(
                    '#' + trackerNum + ': failed to post re-dispatch: '
                    + err.message);
                }
                continue;
              }

              // Dispatch. The body's first token is `/dispatch` so the
              // dispatch wrapper's command match fires; the audit prefix
              // sits on a following line so operators see the action in
              // the timeline. The combined comment is one writeable
              // event, which keeps the timeline cleaner than a two-step
              // (audit then dispatch) sequence.
              const auditBody =
                '/dispatch\n\n'
                + 'sdd-monitor: armed-but-idle on #' + trackerNum
                + ' with ' + readyCount + ' task'
                + (readyCount === 1 ? '' : 's')
                + ' ready; dispatching.';
              try {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: trackerNum, body: auditBody,
                });
                core.info(
                  '#' + trackerNum + ': posted monitor /dispatch ('
                  + readyCount + ' ready task'
                  + (readyCount === 1 ? '' : 's') + ').');
              } catch (err) {
                core.warning(
                  '#' + trackerNum + ': failed to post /dispatch: '
                  + err.message);
              }
            }

            // walkToTracker: walk a task sub-issue up to its tracking
            // issue (task -> Unit -> tracker, two hops per ADR 0005).
            // Returns the tracker issue number, or 0 if the walk does not
            // resolve to a two-hop root.
            //
            // The parent link is read via GraphQL `Issue.parent`, NOT via
            // the REST `parent_issue_url` field. REST does not populate
            // the child->parent pointer for native sub-issues reliably:
            // the field comes back empty on the close webhook and on an
            // immediate REST re-fetch (issue #133, the cascade-stall
            // repro on this issue). sdd-dispatch's own route job switched
            // to GraphQL for exactly this reason; the monitor mirrors it
            // so the in-flight PR-rollup guard does not silently misfire.
            //
            // Fail-closed contract: parentNumberViaGraphql and walkToTracker
            // distinguish a *resolved* walk (returns a number, or 0 when the
            // walk legitimately reaches the top of the tree short of two
            // hops) from an *unresolved* walk caused by a lookup error
            // (rethrows). A swallowed error that collapsed to "no parent"
            // would make an open sdd/ PR look unrelated to its tracker, the
            // in-flight guard would clear, and the monitor would nudge a
            // tracker whose layer is actually in flight — the cancellation
            // storm issue #148 exists to prevent. The caller treats a thrown
            // walk as "assume in flight" and skips the nudge for that
            // tracker only.
            async function parentNumberViaGraphql(nodeId) {
              if (!nodeId) { return null; }
              const result = await github.graphql(
                'query($id: ID!) {' +
                '  node(id: $id) {' +
                '    ... on Issue { parent { id number } }' +
                '  }' +
                '}',
                { id: nodeId });
              const parent = result && result.node && result.node.parent;
              return parent || null;
            }

            async function walkToTracker(ghCli, ownerArg, repoArg, taskNum) {
              // Seed the GraphQL walk from the task issue's node id. A seed
              // or parent lookup error rethrows so the caller fails closed;
              // it must not be confused with a fully-walked tree that has no
              // parent. Wrap callers in try/catch and treat a throw as
              // "assume in flight" for that tracker.
              const { data } = await ghCli.rest.issues.get({
                owner: ownerArg, repo: repoArg, issue_number: taskNum,
              });
              let nodeId = data.node_id;
              let parent = null;
              let walked = 0;
              while (nodeId && walked < 2) {
                const next = await parentNumberViaGraphql(nodeId);
                if (!next) { break; }
                parent = next;
                nodeId = next.id;
                walked += 1;
              }
              // A task closure is exactly two hops below a tracking issue.
              // A shorter walk means the seed was a Unit or the tracker
              // itself, not a task — not a tracker match for this guard.
              if (parent && walked === 2) {
                return parent.number;
              }
              return 0;
            }

    # CodeRabbit stall detection, enablement probe (issue #257). Runs on the
    # workflow GITHUB_TOKEN: only the config-file presence check (getContent)
    # needs contents:read, and the App token deliberately carries no Contents
    # permission. The .coderabbit.yaml config file is optional for a
    # CodeRabbit install, hence the SDD_CODERABBIT override in both
    # directions. This pass is NOT gated on the in-flight step: a live
    # sdd-execute run says nothing about CodeRabbit's silence on an already
    # open PR, and the pass posts no /dispatch, so the cancellation-storm
    # concern behind the in-flight gate does not apply.
    - name: CodeRabbit enablement
      id: coderabbit
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        SDD_CODERABBIT: ${{ inputs.coderabbit }}
      with:
        github-token: ${{ inputs.runs-token }}
        script: |
            // SDD_CODERABBIT=0 force-disables, =1 force-enables; anything
            // else falls through to the config-file presence probe.
            const flag = (process.env.SDD_CODERABBIT || '').trim();
            if (flag === '0') {
              core.info('SDD_CODERABBIT=0; CodeRabbit stall detection off.');
              core.setOutput('enabled', 'false');
              return;
            }
            if (flag === '1') {
              core.info('SDD_CODERABBIT=1; CodeRabbit stall detection on.');
              core.setOutput('enabled', 'true');
              return;
            }
            const { owner, repo } = context.repo;
            for (const path of ['.coderabbit.yaml', '.coderabbit.yml']) {
              try {
                await github.rest.repos.getContent({ owner, repo, path });
                core.info(
                  path + ' present; CodeRabbit stall detection on.');
                core.setOutput('enabled', 'true');
                return;
              } catch (err) {
                if (err.status !== 404) {
                  // Fail closed on a non-404 probe error: better to skip a
                  // pass (the cron retries in ten minutes) than to nudge a
                  // repo that may not run CodeRabbit at all.
                  core.info(
                    'Could not probe ' + path + ': ' + err.message
                    + '; treating as absent.');
                }
              }
            }
            core.info(
              'No CodeRabbit config and SDD_CODERABBIT unset; '
              + 'stall detection off.');
            core.setOutput('enabled', 'false');

    # CodeRabbit stall detection (issue #257). For each open non-draft sdd/
    # PR without needs-human: when the head commit has aged past the stall
    # window and coderabbitai[bot] has left no review and no comment since
    # that commit, post a bounded App-authored "@coderabbitai review" nudge;
    # once the per-head-sha nudge budget is spent and the PR is still
    # stalled on a later pass, apply needs-human and post one escalation
    # comment. A new push (new head sha) resets the budget, matching
    # CodeRabbit's per-push review model. Runs on the App token: the nudge
    # and escalation comments must be App-authored (issues:write), and the
    # PR/review reads ride the App's pull-requests:read.
    - name: CodeRabbit stall detection
      if: steps.coderabbit.outputs.enabled == 'true'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        SDD_CODERABBIT_STALL_MIN: ${{ inputs.coderabbit-stall-min }}
        SDD_CODERABBIT_NUDGE_MAX: ${{ inputs.coderabbit-nudge-max }}
        SDD_MONITOR_APP_ID: ${{ inputs.app-id }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
            const { owner, repo } = context.repo;
            // CodeRabbit appears as `coderabbitai` with or without the
            // `[bot]` suffix depending on surface; accept both, matching
            // the reviewer carve-out in sdd-route-execute.
            const isCodeRabbit = (login) => {
              const lc = (login || '').toLowerCase();
              return lc === 'coderabbitai' || lc === 'coderabbitai[bot]';
            };

            // Same NaN-guard idiom as the debounce window above: a typo in
            // the repo var must fall back to the default, not silently
            // disable (or zero out) the gate.
            const parsedStall = parseInt(
              process.env.SDD_CODERABBIT_STALL_MIN || '', 10);
            const stallMin =
              Number.isFinite(parsedStall) && parsedStall > 0
                ? parsedStall
                : 30;
            const parsedMax = parseInt(
              process.env.SDD_CODERABBIT_NUDGE_MAX || '', 10);
            const nudgeMax =
              Number.isFinite(parsedMax) && parsedMax > 0
                ? parsedMax
                : 2;
            // App id of the github-token's owner, for the marker-budget
            // author gate below. Optional: when unset the budget falls
            // back to author-blind counting (never to a zero count —
            // that would un-bound the nudge loop).
            const parsedAppId = parseInt(
              process.env.SDD_MONITOR_APP_ID || '', 10);
            const appId =
              Number.isFinite(parsedAppId) && parsedAppId > 0
                ? parsedAppId
                : null;

            let openPrs = [];
            try {
              openPrs = await github.paginate(
                github.rest.pulls.list,
                { owner, repo, state: 'open', per_page: 100 });
            } catch (err) {
              core.info(
                'Could not list open PRs: ' + err.message
                + '; nothing to do.');
              return;
            }
            // Candidates: open non-draft sdd/ implementation PRs not
            // already escalated to needs-human. Human-authored PRs (no
            // sdd/ branch) are out of scope in V1 — the nudge itself
            // would be safe, but scope stays demand-driven (no
            // SDD_CODERABBIT_SCOPE yet).
            const candidates = openPrs.filter((p) =>
              !p.draft
              && ((p.head && p.head.ref) || '').startsWith('sdd/')
              && !(p.labels || []).some(
                (l) => (typeof l === 'string' ? l : l.name)
                  === 'needs-human'));
            if (!candidates.length) {
              core.info(
                'No open non-draft sdd/ PRs without needs-human; '
                + 'nothing to do.');
              return;
            }

            for (const pr of candidates) {
              const prNum = pr.number;
              const headSha = pr.head.sha;

              // Head-commit timestamp via the PR commits list — a
              // pull-requests:read endpoint, so the App token covers it
              // (repos.getCommit would need contents:read, which the App
              // token deliberately lacks).
              let headMs = NaN;
              try {
                const commits = await github.paginate(
                  github.rest.pulls.listCommits,
                  { owner, repo, pull_number: prNum, per_page: 100 });
                const head =
                  commits.find((c) => c.sha === headSha)
                  || commits[commits.length - 1];
                const meta = head && head.commit;
                const date = meta
                  && ((meta.committer && meta.committer.date)
                    || (meta.author && meta.author.date));
                headMs = date ? Date.parse(date) : NaN;
              } catch (err) {
                core.info(
                  'PR #' + prNum + ': could not read head commit ('
                  + err.message + '); skipping.');
                continue;
              }
              if (!Number.isFinite(headMs)) {
                core.info(
                  'PR #' + prNum + ': no head commit timestamp; skipping.');
                continue;
              }
              const ageMin = Math.floor((Date.now() - headMs) / 60000);
              if (ageMin < stallMin) {
                core.info(
                  'PR #' + prNum + ': head ' + headSha.slice(0, 7)
                  + ' is ' + ageMin + 'm old (< ' + stallMin
                  + 'm stall window); skipping.');
                continue;
              }

              // Stall predicate: no review AND no comment by CodeRabbit
              // (either login form) since the head commit. Reviews and
              // review (diff) comments are pull-requests:read; issue
              // comments ride issues:write's implied read. The issue
              // comments are fetched once and reused for the marker
              // budget below.
              let reviews = [];
              let reviewComments = [];
              let issueComments = [];
              try {
                reviews = await github.paginate(
                  github.rest.pulls.listReviews,
                  { owner, repo, pull_number: prNum, per_page: 100 });
                reviewComments = await github.paginate(
                  github.rest.pulls.listReviewComments,
                  { owner, repo, pull_number: prNum, per_page: 100 });
                issueComments = await github.paginate(
                  github.rest.issues.listComments,
                  { owner, repo, issue_number: prNum, per_page: 100 });
              } catch (err) {
                core.info(
                  'PR #' + prNum + ': could not read CodeRabbit activity ('
                  + err.message + '); skipping.');
                continue;
              }
              const since = (items, ts) => items.some((it) =>
                isCodeRabbit(it.user && it.user.login)
                && Number.isFinite(Date.parse(ts(it)))
                && Date.parse(ts(it)) >= headMs);
              const active =
                since(reviews, (r) => r.submitted_at)
                || since(reviewComments, (c) => c.created_at)
                || since(issueComments, (c) => c.created_at);
              if (active) {
                core.info(
                  'PR #' + prNum + ': CodeRabbit active since head '
                  + headSha.slice(0, 7) + '; not stalled.');
                continue;
              }

              // Bounded nudges. The hidden marker in each App-authored
              // nudge comment is the durable per-head-sha budget counter;
              // a new push mints a new sha and so resets the budget. The
              // escalation marker is one-shot per head sha: needs-human
              // already keeps the PR out of the candidate set, and the
              // marker stops a re-escalation if an operator removes the
              // label while the stall persists.
              const nudgeMarker =
                '<!-- sdd-monitor:coderabbit-nudge sha=' + headSha + ' -->';
              const escalateMarker =
                '<!-- sdd-monitor:coderabbit-escalated sha=' + headSha
                + ' -->';
              // Budget state is derived only from comments performed via
              // the configured App (the monitor's own author identity).
              // The marker format is predictable, so an author-blind
              // count would let any commenter spoof markers to burn the
              // nudge budget or suppress escalation outright.
              const appComments = appId
                ? issueComments.filter((c) =>
                  c.performed_via_github_app
                  && c.performed_via_github_app.id === appId)
                : issueComments;
              const nudges = appComments.filter(
                (c) => (c.body || '').includes(nudgeMarker)).length;
              const escalated = appComments.some(
                (c) => (c.body || '').includes(escalateMarker));
              if (escalated) {
                core.info(
                  'PR #' + prNum + ': already escalated for head '
                  + headSha.slice(0, 7) + '; skipping.');
                continue;
              }

              if (nudges < nudgeMax) {
                // Nudge: marker + audit line + the command on its own
                // line. Whether CodeRabbit honors @coderabbitai review
                // from an App author is unverified (issue #257 open
                // question 1); the escalation below delivers the value
                // even if the nudge is ignored.
                const body =
                  nudgeMarker + '\n\n'
                  + 'sdd-monitor: CodeRabbit has not reviewed head '
                  + headSha.slice(0, 7) + ' after ' + ageMin
                  + 'm; nudging (attempt ' + (nudges + 1) + ' of '
                  + nudgeMax + ').\n\n'
                  + '@coderabbitai review';
                try {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: prNum, body,
                  });
                  core.info(
                    'PR #' + prNum + ': posted CodeRabbit nudge '
                    + (nudges + 1) + '/' + nudgeMax + ' for head '
                    + headSha.slice(0, 7) + '.');
                } catch (err) {
                  core.warning(
                    'PR #' + prNum + ': failed to post nudge: '
                    + err.message);
                }
                continue;
              }

              // Budget exhausted and still stalled on a later pass:
              // escalate. needs-human is the framework's standard visible
              // hand-off; the audit comment tells the operator what to do.
              const escalateBody =
                escalateMarker + '\n\n'
                + 'sdd-monitor: CodeRabbit has not reviewed after '
                + nudges + ' nudge' + (nudges === 1 ? '' : 's')
                + '; review manually or merge per policy. Applying '
                + 'needs-human.';
              // Label first, and only persist the escalation marker once
              // needs-human is actually applied: the marker makes later
              // passes skip this PR, so posting it after a failed label
              // would strand the stall with no visible hand-off and no
              // retry path. On a label failure, skip the comment — the
              // next pass retries the whole escalation.
              let labeled = false;
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: prNum,
                  labels: ['needs-human'],
                });
                labeled = true;
              } catch (err) {
                core.warning(
                  'PR #' + prNum + ': failed to apply needs-human: '
                  + err.message);
              }
              if (!labeled) {
                continue;
              }
              try {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNum, body: escalateBody,
                });
              } catch (err) {
                core.warning(
                  'PR #' + prNum + ': failed to post escalation: '
                  + err.message);
              }
              core.info(
                'PR #' + prNum + ': escalated CodeRabbit stall to '
                + 'needs-human after ' + nudges + ' nudge'
                + (nudges === 1 ? '' : 's') + '.');
            }
