name: sdd-route-triage
description: >
  Route decision for sdd-triage. Filters tracking-issue triage/resume label
  events, gates /triage /approve /revise on real repository permission, carves
  out the fast-path /approve (handled by sdd-spec), and routes merged
  architecture PRs. Extracted verbatim (ADR 0015).

inputs:
  github-token:
    description: 'Token for the REST calls in the route logic.'
    required: false
    default: ${{ github.token }}
  reentry-tracking-issue:
    description: >
      Spike-wave re-entry (issue #229). When set to a tracking issue number,
      the action short-circuits the webhook routing and emits aw_context naming
      that tracking issue with phase B. The sdd-spike-reentry wrapper passes
      this after it has confirmed the wave drained, to re-enter phase B whose
      natural arch-PR-merge trigger already fired before the wave existed.
    required: false
    default: ''

outputs:
  should_run:
    description: "'true' when the agent should run."
    value: ${{ steps.decide.outputs.should_run }}
  aw_context:
    description: 'JSON naming the triggering entity; empty when should_run is false.'
    value: ${{ steps.decide.outputs.aw_context }}
  phase:
    description: >
      The SDD triage phase this event drives: 'A' (sdd:triage label or /triage
      comment), 'B' (merged arch PR), 'C' (/approve comment), or '' otherwise.
      The cycle-detect wrapper job gates on 'C'.
    value: ${{ steps.decide.outputs.phase }}
  item_number:
    description: >
      The tracking issue (or PR) number from aw_context, surfaced directly so
      the wrapper's deterministic jobs read it without re-parsing the JSON.
      Empty when should_run is false.
    value: ${{ steps.decide.outputs.item_number }}

runs:
  using: composite
  steps:
    - name: Decide whether to run and build aw_context
      id: decide
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        REENTRY_TRACKING_ISSUE: ${{ inputs.reentry-tracking-issue }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
            const event = context.eventName;
            const payload = context.payload;
            let run = false;
            let ctx = {};

            // Spike-wave re-entry (issue #229). When the sdd-spike-reentry
            // wrapper passes a tracking issue number, short-circuit the
            // webhook routing: emit aw_context naming that tracking issue and
            // set phase B. Phase B's natural arch-PR-merge trigger fired
            // before the spike wave existed, so the wave draining cannot
            // re-fire it through a real webhook — the wrapper synthesizes the
            // re-entry deterministically and routes it here. Phase is B (post
            // the plan), never C, so the sdd-triage wrapper's cycle-detect job
            // (gated on phase C) does not fire on a re-entry.
            const reentry = (process.env.REENTRY_TRACKING_ISSUE || '').trim();
            if (reentry) {
              const reentryNum = parseInt(reentry, 10);
              if (Number.isInteger(reentryNum) && reentryNum > 0) {
                core.setOutput('should_run', 'true');
                core.setOutput('aw_context', JSON.stringify({
                  item_type: 'issue',
                  item_number: reentryNum,
                  reentry: 'spike-wave-drained',
                }));
                core.setOutput('phase', 'B');
                core.setOutput('item_number', String(reentryNum));
                return;
              }
              core.info('reentry-tracking-issue is not a positive integer ('
                + reentry + '); ignoring.');
            }
            // The SDD triage phase this event drives, surfaced as an output so
            // the wrapper's deterministic cycle-detect job can gate on phase C
            // (the /approve materialization). 'A' = architecture design,
            // 'B' = plan-preview comment, 'C' = materialize the tree. A resume
            // (needs-human cleared) and a non-routed event leave it ''; the
            // cycle-detect job only fires on 'C', so a '' on a resume is safe.
            let phase = '';

            // A tracking issue gained sdd:triage (phase A), or needs-human was
            // cleared (resume).
            if (event === 'issues') {
              const action = payload.action;
              const label = payload.label && payload.label.name;
              if (action === 'labeled' && label === 'sdd:triage') {
                run = true;
                phase = 'A';
              } else if (action === 'unlabeled' && label === 'needs-human') {
                run = true;
                // Resume of whatever phase handed off; left '' (the
                // cycle-detect job only fires on a fresh phase C).
              }
              // The triage boundary is the tracking issue only. sdd:triage or a
              // needs-human clear on a sub-issue (a Unit or a task, each of
              // which has a parent in the feature tree) must not route triage.
              // A tracking issue has no parent; filter on parent_issue_url, the
              // same guard sdd-validate applies on its sdd:ready route.
              if (run) {
                try {
                  const { data } = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: payload.issue.number,
                  });
                  if (data.parent_issue_url) {
                    run = false;
                    core.info('Issue #' + payload.issue.number
                      + ' has a parent (' + data.parent_issue_url
                      + '); not a tracking issue, ignoring.');
                  }
                } catch (err) {
                  core.info('Could not fetch issue #' + payload.issue.number
                    + ': ' + err.message);
                }
              }
              if (run) {
                ctx = { item_type: 'issue', item_number: payload.issue.number };
              }
            }

            // A /triage, /approve, or /revise comment from an author with repo
            // write access. The gate is the actor's real repository
            // permission, not author_association: author_association reports
            // the relationship to the thread (OWNER/MEMBER/COLLABORATOR),
            // which is not the same as push access. A MEMBER of the org need
            // not have write on this repo, and a COLLABORATOR may be
            // read-only. The collaborators/{user}/permission API returns the
            // actual permission level; only write, maintain, or admin may run
            // a command.
            if (event === 'issue_comment' && payload.action === 'created') {
              const body = (payload.comment.body || '').trim();
              const firstWord = body.split(/\s+/)[0];
              const isCommand = firstWord === '/triage'
                || firstWord === '/approve' || firstWord === '/revise';
              if (isCommand) {
                const actor = payload.comment.user.login;
                let permission = 'none';
                try {
                  const resp = await github.rest.repos
                    .getCollaboratorPermissionLevel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      username: actor,
                    });
                  // role_name is the precise role (write/maintain/triage/...)
                  // when present; permission is the legacy bucket
                  // (admin/write/read/none) that collapses maintain into
                  // write and triage into read.
                  permission = resp.data.role_name || resp.data.permission;
                } catch (err) {
                  core.info(
                    'Could not resolve repo permission for ' + actor
                    + ': ' + err.message);
                }
                const canWrite = permission === 'write'
                  || permission === 'maintain' || permission === 'admin';
                if (canWrite) {
                  // Fast-path carve-out (ADR 0012): /approve on a tracking
                  // issue carrying sdd:fastpath (or sdd:fastpath-review,
                  // when the human typed /approve before the stub spec PR
                  // merged) is handled by the sdd-spec wrapper's
                  // fastpath-approve job (it dispatches sdd-execute-{tier}
                  // directly, or noops with a guidance comment when the
                  // stub PR is still open). This wrapper skips /approve in
                  // both cases so the two wrappers do not both fire on the
                  // same comment.
                  const isPr = !!payload.issue.pull_request;
                  let skipFastpath = false;
                  if (firstWord === '/approve' && !isPr) {
                    try {
                      const { data } = await github.rest.issues.get({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: payload.issue.number,
                      });
                      const labels = (data.labels || []).map(
                        (l) => l.name || l);
                      if (labels.includes('sdd:fastpath')
                          || labels.includes('sdd:fastpath-review')) {
                        skipFastpath = true;
                        core.info('/approve on a fast-path tracking'
                          + ' issue; sdd-spec wrapper will handle it.');
                      }
                    } catch (err) {
                      core.info('Could not fetch issue #'
                        + payload.issue.number + ': ' + err.message);
                    }
                  }
                  if (!skipFastpath) {
                    run = true;
                    // Phase from the command: /triage designs the architecture
                    // (A), /approve materializes the tree (C). /revise re-runs
                    // phase B or reconciles post-approve; it does not freshly
                    // materialize, so it leaves phase '' and the cycle-detect
                    // job does not fire on it.
                    if (firstWord === '/triage') {
                      phase = 'A';
                    } else if (firstWord === '/approve') {
                      phase = 'C';
                    }
                    ctx = {
                      item_type: isPr ? 'pull_request' : 'issue',
                      item_number: payload.issue.number,
                      comment_id: payload.comment.id,
                    };
                  }
                } else {
                  core.info(
                    'Command from an author without write access ('
                    + permission + '); ignoring.');
                }
              }
            }

            // A merged architecture pull request. Scoped to architecture PRs
            // only: the head branch must follow the arch/<slug> convention. A
            // merged non-architecture PR is not this agent's concern and is
            // left to no-op.
            if (event === 'pull_request' && payload.action === 'closed') {
              const merged = payload.pull_request.merged === true;
              const headRef = payload.pull_request.head
                && payload.pull_request.head.ref || '';
              const isArchBranch = headRef.startsWith('arch/');
              if (merged && isArchBranch) {
                run = true;
                phase = 'B';
                ctx = {
                  item_type: 'pull_request',
                  item_number: payload.pull_request.number,
                };
              } else if (merged) {
                core.info('Merged PR is not an arch branch; ignoring.');
              }
            }

            core.setOutput('should_run', run ? 'true' : 'false');
            core.setOutput('aw_context', run ? JSON.stringify(ctx) : '');
            // phase and item_number are surfaced for the wrapper's
            // deterministic cycle-detect job; both empty when not running.
            core.setOutput('phase', run ? phase : '');
            core.setOutput('item_number',
              run && ctx.item_number ? String(ctx.item_number) : '');
