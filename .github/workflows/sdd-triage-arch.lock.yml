    inputs:
      aw_context:
        default: ""
        description: |
          JSON naming the triggering entity, built by the wrapper's sdd-route-triage action. Identifies the tracking issue or the architecture pull request this run operates on.
        required: false
        type: string
      min_task:
        default: ""
        description: |
          Task-bundling diff floor in net lines, from the consumer's SDD_TRIAGE_MIN_TASK repository variable (the wrapper maps it in). Unused by the arch phase, accepted for a uniform wrapper call.
        required: false
        type: string
