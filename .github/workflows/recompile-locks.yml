# Recompile agent locks after a lock-affecting source merges to main, and push
# the regenerated .lock.yml files (and the digest snapshot) straight back to
# main. This closes the ADR 0018 two-step: a fragment edit no longer needs a
# manual follow-up recompile commit.
#
# Why this can push to protected main: main is guarded by ruleset 16496590,
# whose bypass actors include the `spectacles-bot` App (actor_type Integration).
# The push below carries that App's installation token, so it bypasses the
# pull_request rule. The default GITHUB_TOKEN's github-actions[bot] is not a
# bypass actor and would be rejected. See ADR 0019.
#
# Loop guard: the only paths this workflow pushes are .github/workflows/*.lock.yml
# and scripts/digest-snapshot.yml. Neither matches the `paths:` trigger below
# (shared/** and .github/workflows/*.md), so the bot's own push never re-fires
# this workflow.
name: recompile-locks

on:
  push:
    branches: [main]
    paths:
      - shared/**
      - .github/workflows/*.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recompile-locks
  cancel-in-progress: false

jobs:
  recompile:
    runs-on: ubuntu-latest
    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-workflows: write

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # No token here: the repo is public (read needs no auth) and omitting
          # it keeps the write-scoped App token out of git config for the
          # compile/install steps. persist-credentials: false also stops the
          # default GITHUB_TOKEN being persisted. The App token is wired in only
          # for the final push step below.
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - name: Build patched gh-aw
        env:
          GH_TOKEN: ${{ github.token }}
          GH_AW_PIN: v0.77.5
        run: |
          set -euo pipefail
          # Stock gh-aw ignores CLAUDE_CODE_OAUTH_TOKEN and would clobber the
          # OAuth-token locks with ANTHROPIC_API_KEY ones on auto-recompile.
          # Build the pinned tag with our patch. Version ldflags MUST equal the
          # pin so regenerated locks are byte-identical to the committed ones.
          git clone --depth 1 --branch "${GH_AW_PIN}" \
            https://github.com/github/gh-aw "${RUNNER_TEMP}/gh-aw-src"
          git -C "${RUNNER_TEMP}/gh-aw-src" apply \
            "${GITHUB_WORKSPACE}/.github/gh-aw-patches/claude-oauth-token.patch"
          ( cd "${RUNNER_TEMP}/gh-aw-src" \
            && go build -ldflags "-s -w -X main.version=${GH_AW_PIN} -X main.isRelease=true" \
                 -o /usr/local/bin/gh-aw ./cmd/gh-aw )
          gh-aw --version

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Recompile locks and refresh digest snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh-aw compile --no-check-update
          python scripts/test-digest-snapshot.py --write

      - name: Push if locks drifted
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BOT_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          # --porcelain reports modified tracked locks and untracked new ones,
          # so a freshly generated but uncommitted .lock.yml is caught too.
          drift="$(git status --porcelain -- '.github/workflows/*.lock.yml' scripts/digest-snapshot.yml)"
          if [ -z "$drift" ]; then
            echo "Locks already in sync with sources; nothing to push."
            exit 0
          fi
          echo "Drift detected:"
          echo "$drift"

          bot_user_id="$(gh api "/users/${BOT_SLUG}[bot]" --jq .id)"
          git config user.name "${BOT_SLUG}[bot]"
          git config user.email "${bot_user_id}+${BOT_SLUG}[bot]@users.noreply.github.com"

          git add '.github/workflows/*.lock.yml' scripts/digest-snapshot.yml
          git commit -m "build: recompile locks after fragment merge [skip ci]"

          # Authenticate the App token only for these final git operations
          # (checkout did not persist it). GH_TOKEN is a registered secret, so
          # it is masked in logs. A second fragment merge may have landed while
          # this run compiled; rebase the generated-only commit onto current
          # main before pushing.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git pull --rebase origin main
          git push origin HEAD:main
