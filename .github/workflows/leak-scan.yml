name: leak-scan
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Scan tree against the denylist
        env:
          LEAK_DENYLIST: ${{ secrets.LEAK_DENYLIST }}
        run: bash scripts/leak-scan.sh
