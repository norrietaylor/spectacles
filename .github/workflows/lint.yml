name: lint
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md"
      - name: shellcheck
        run: |
          mapfile -t files < <(git ls-files '*.sh')
          if [ "${#files[@]}" -gt 0 ]; then
            shellcheck "${files[@]}"
          else
            echo "no shell scripts to check"
          fi
      - name: actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          # Lint only hand-authored workflows. The gh-aw-generated *.lock.yml
          # files use gh-aw extensions (concurrency.queue) and embed scripts
          # that actionlint flags; they are generated, not hand-edited.
          mapfile -t wf < <(git ls-files '.github/workflows/*.yml' '.github/workflows/*.yaml' ':!:.github/workflows/*.lock.yml')
          if [ "${#wf[@]}" -gt 0 ]; then
            ./actionlint -color "${wf[@]}"
          else
            echo "no hand-authored workflow files to lint"
          fi

  # Verify every committed .lock.yml matches a fresh compile of its .md source.
  # The agent locks compile with strict: false (ADR 0004), which drops gh-aw's
  # run-time lock-file check; this gate replaces it. A stale lock fails CI.
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
      - name: Build patched gh-aw
        env:
          GH_TOKEN: ${{ github.token }}
          GH_AW_PIN: v0.77.5
        run: |
          set -euo pipefail
          # Stock gh-aw ignores CLAUDE_CODE_OAUTH_TOKEN and would regenerate
          # ANTHROPIC_API_KEY locks, reddening this gate. Build the pinned tag
          # with our OAuth-token patch. Version ldflags MUST equal the pin so the
          # lock output is byte-identical to the committed locks this job diffs.
          git clone --depth 1 --branch "${GH_AW_PIN}" \
            https://github.com/github/gh-aw "${RUNNER_TEMP}/gh-aw-src"
          git -C "${RUNNER_TEMP}/gh-aw-src" apply \
            "${GITHUB_WORKSPACE}/.github/gh-aw-patches/claude-oauth-token.patch"
          ( cd "${RUNNER_TEMP}/gh-aw-src" \
            && go build -ldflags "-s -w -X main.version=${GH_AW_PIN} -X main.isRelease=true" \
                 -o /usr/local/bin/gh-aw ./cmd/gh-aw )
          gh-aw --version
      - name: Compile and check lock drift
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh-aw compile --no-check-update
          # git status --porcelain reports both modified tracked locks and
          # untracked new ones (??), so a freshly generated but uncommitted
          # .lock.yml is caught — git diff alone would miss an untracked file.
          drift=$(git status --porcelain -- '.github/workflows' | grep '\.lock\.yml' || true)
          if [ -n "$drift" ]; then
            echo "::error::Workflow locks are out of date or uncommitted. Run 'gh aw compile' and commit the result."
            echo "$drift"
            exit 1
          fi

  # Assert each agent's safe-output allowlist matches its prose
  # instructions. gh-aw enforces the frontmatter allowlist at runtime
  # and silently rejects a label the workflow did not declare; that
  # silent rejection is the bug `sdd-pr-sanitize` and the
  # `sdd-triage-dedupe-tasks` deterministic wrappers exist partly to
  # paper over. This job catches the mismatch at PR time. The script
  # reads the .md sources directly (equivalent to the .lock.yml the
  # issue cites and easier to parse), and documents intentional
  # asymmetries in scripts/safe-output-allowlist-exceptions.yml.
  safe-outputs:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Assert allowlists match prose
        run: python scripts/test-safe-output-allowlists.py

  # Assert the slash-command vocabulary is consistent across the
  # wrappers (the routing layer), the source-of-truth command table in
  # `shared/sdd-interaction.md`, and prose mentions across workflow
  # sources and the docs page. A new command added in one place and
  # forgotten in another is the silent inconsistency this guards. See
  # the script docstring for the W/T/P set definitions; this job is
  # independent of `compile` because it reads the .md sources directly.
  command-table:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Assert command-table consistency
        run: python scripts/test-command-table.py

  # Assert the `sdd:*` lifecycle labels form a coherent state machine.
  # The invariant "exactly one `sdd:*` lifecycle label on the tracking
  # issue at a time" is prose-only today: an `add-labels` of a new
  # state without a paired `remove-labels` of the predecessor — or two
  # workflows both writing the same state — would silently break it.
  # This job statically analyzes the `.github/workflows/sdd-*.md`
  # sources plus the catalogue at `templates/.github/labels.yml`,
  # cross-checked against the declared classification in
  # `scripts/lifecycle-states.yml`, and fails the PR on any violation.
  # Independent of `compile` for the same reason as the two jobs
  # above: it reads the .md sources directly.
  lifecycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Assert lifecycle state-machine invariants
        run: python scripts/test-lifecycle-state-machine.py

  # Assert every `R<unit>.<seq>` requirement-ID citation in workflow
  # prose, ADRs, and shared fragments resolves to a declared requirement
  # in some `docs/specs/*/` spec file. A spec edit that renumbers or
  # deletes a requirement breaks every dangling reference; without this
  # check those breakages reach runtime, where an agent cites a
  # non-existent requirement. The script also warns (non-fatal) on dead
  # requirements: declared IDs never cited outside their own spec.
  # Independent of `compile` for the same reason as the three jobs
  # above: it reads the .md sources directly.
  req-ids:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Assert requirement-ID cross-references resolve
        run: python scripts/test-requirement-ids.py

  # Assert every container reference and pinned digest embedded in the
  # `gh-aw-manifest` header of each `.github/workflows/*.lock.yml` matches
  # the checked-in snapshot at `scripts/digest-snapshot.yml`. A compile
  # against a moved or unpinned tag would silently shift the runtime
  # without a human noticing — the lock-file diff is large and digest
  # changes look like noise. This job turns a digest change into a small,
  # reviewable snapshot diff. Regenerate with
  # `python scripts/test-digest-snapshot.py --write` after an intentional
  # bump. Independent of `compile` for the same reason as the four jobs
  # above: it reads the lock files directly.
  digests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Assert container digests match snapshot
        run: python scripts/test-digest-snapshot.py

  # Self-check the shared blocked-by parser and the deterministic cycle
  # detector (.github/actions/shared/blocked-by.js) that sdd-cycle-detect and
  # sdd-dispatch-compute both require. The fixture asserts parseBlockers parses
  # same-repo and cross-repo `blocked by` lines and that detectCycle finds the
  # latent cycle (issue #229) and clears a forward-only DAG. Plain node, no
  # dependencies; ubuntu-latest ships node.
  cycle-detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pinned to the immutable v4 SHA (the pin recompile-locks.yml already
        # uses) with persist-credentials: false — this job only reads the tree
        # to run a node self-check, so it persists no git credentials
        # (CodeRabbit, #239).
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run the cycle-detect self-check
        run: node scripts/test-cycle-detect.mjs

  # Smoke-test the assumption the sdd-execute host post-step depends on: that
  # the stable rustfmt it runs (`cargo fmt --all`) can parse and normalize an
  # edition-2024 `let`-chain to what a consumer's `cargo fmt --all -- --check`
  # accepts. An older host rustfmt that silently fails to format the let-chain
  # is the #163 regression; this job turns that into a red PR check. Pinned to
  # the same dtolnay/rust-toolchain ref the post-step installs.
  fmt-letchain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt
      - name: Assert rustfmt normalizes an edition-2024 let-chain
        run: bash scripts/test-fmt-letchain.sh
