name: lint
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md"
      - name: shellcheck
        run: |
          mapfile -t files < <(git ls-files '*.sh')
          if [ "${#files[@]}" -gt 0 ]; then
            shellcheck "${files[@]}"
          else
            echo "no shell scripts to check"
          fi
      - name: actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          # Lint only hand-authored workflows. The gh-aw-generated *.lock.yml
          # files use gh-aw extensions (concurrency.queue) and embed scripts
          # that actionlint flags; they are generated, not hand-edited.
          mapfile -t wf < <(git ls-files '.github/workflows/*.yml' '.github/workflows/*.yaml' ':!:.github/workflows/*.lock.yml')
          if [ "${#wf[@]}" -gt 0 ]; then
            ./actionlint -color "${wf[@]}"
          else
            echo "no hand-authored workflow files to lint"
          fi

  # Verify every committed .lock.yml matches a fresh compile of its .md source.
  # The agent locks compile with strict: false (ADR 0004), which drops gh-aw's
  # run-time lock-file check; this gate replaces it. A stale lock fails CI.
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install gh-aw
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-aw --pin v0.74.3
      - name: Compile and check lock drift
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh aw compile --no-check-update
          # git status --porcelain reports both modified tracked locks and
          # untracked new ones (??), so a freshly generated but uncommitted
          # .lock.yml is caught — git diff alone would miss an untracked file.
          drift=$(git status --porcelain -- '.github/workflows' | grep '\.lock\.yml' || true)
          if [ -n "$drift" ]; then
            echo "::error::Workflow locks are out of date or uncommitted. Run 'gh aw compile' and commit the result."
            echo "$drift"
            exit 1
          fi

  # Assert each agent's safe-output allowlist matches its prose
  # instructions. gh-aw enforces the frontmatter allowlist at runtime
  # and silently rejects a label the workflow did not declare; that
  # silent rejection is the bug `sdd-pr-sanitize` and the
  # `sdd-triage-dedupe-tasks` deterministic wrappers exist partly to
  # paper over. This job catches the mismatch at PR time. The script
  # reads the .md sources directly (equivalent to the .lock.yml the
  # issue cites and easier to parse), and documents intentional
  # asymmetries in scripts/safe-output-allowlist-exceptions.yml.
  safe-outputs:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Assert allowlists match prose
        run: python scripts/test-safe-output-allowlists.py

  # Assert the slash-command vocabulary is consistent across the
  # wrappers (the routing layer), the source-of-truth command table in
  # `shared/sdd-interaction.md`, and prose mentions across workflow
  # sources and the docs page. A new command added in one place and
  # forgotten in another is the silent inconsistency this guards. See
  # the script docstring for the W/T/P set definitions; this job is
  # independent of `compile` because it reads the .md sources directly.
  command-table:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Assert command-table consistency
        run: python scripts/test-command-table.py

  # Assert the `sdd:*` lifecycle labels form a coherent state machine.
  # The invariant "exactly one `sdd:*` lifecycle label on the tracking
  # issue at a time" is prose-only today: an `add-labels` of a new
  # state without a paired `remove-labels` of the predecessor — or two
  # workflows both writing the same state — would silently break it.
  # This job statically analyzes the `.github/workflows/sdd-*.md`
  # sources plus the catalogue at `templates/.github/labels.yml`,
  # cross-checked against the declared classification in
  # `scripts/lifecycle-states.yml`, and fails the PR on any violation.
  # Independent of `compile` for the same reason as the two jobs
  # above: it reads the .md sources directly.
  lifecycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Assert lifecycle state-machine invariants
        run: python scripts/test-lifecycle-state-machine.py
