name: lint
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md"
      - name: shellcheck
        run: |
          mapfile -t files < <(git ls-files '*.sh')
          if [ "${#files[@]}" -gt 0 ]; then
            shellcheck "${files[@]}"
          else
            echo "no shell scripts to check"
          fi
      - name: actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          # Lint only hand-authored workflows. The gh-aw-generated *.lock.yml
          # files use gh-aw extensions (concurrency.queue) and embed scripts
          # that actionlint flags; they are generated, not hand-edited.
          mapfile -t wf < <(git ls-files '.github/workflows/*.yml' '.github/workflows/*.yaml' ':!:.github/workflows/*.lock.yml')
          if [ "${#wf[@]}" -gt 0 ]; then
            ./actionlint -color "${wf[@]}"
          else
            echo "no hand-authored workflow files to lint"
          fi

  # Verify every committed .lock.yml matches a fresh compile of its .md source.
  # The agent locks compile with strict: false (ADR 0004), which drops gh-aw's
  # run-time lock-file check; this gate replaces it. A stale lock fails CI.
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install gh-aw
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-aw --pin v0.74.3
      - name: Compile and check lock drift
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh aw compile --no-check-update
          # git status --porcelain reports both modified tracked locks and
          # untracked new ones (??), so a freshly generated but uncommitted
          # .lock.yml is caught — git diff alone would miss an untracked file.
          drift=$(git status --porcelain -- '.github/workflows' | grep '\.lock\.yml' || true)
          if [ -n "$drift" ]; then
            echo "::error::Workflow locks are out of date or uncommitted. Run 'gh aw compile' and commit the result."
            echo "$drift"
            exit 1
          fi
