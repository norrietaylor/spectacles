name: sdd-triage

# Thin wrapper for the sdd-triage agents.
#
# sdd-triage is split into three per-phase reusable workflows (issue #271,
# ADR 0029): sdd-triage-arch.lock.yml (architecture), sdd-triage-plan.lock.yml
# (plan comment), and sdd-triage-materialize.lock.yml (Unit/task tree), each
# compiled from its sdd-triage-<phase>.md source. This wrapper carries the real
# event triggers, gates the comment commands to authors with repository write
# access, resolves a deterministic target through the sdd-route-triage action,
# and dispatches the triggering entity to the matching phase workflow through
# the aw_context input. A consumer repository installs this wrapper unchanged.
#
# The gh-aw command:/slash_command trigger (with its roles: gate) is not used
# here: that trigger is gh-aw frontmatter and only takes effect when gh aw
# compiles a workflow. This wrapper is a hand-written GitHub Actions workflow,
# not a gh-aw source file, so gh aw never processes it. The gating is therefore
# done explicitly below with a real repository-permission check.

on:
  # A tracking issue gained the sdd:triage label (phase A), or the needs-human
  # label was cleared (resume).
  issues:
    types: [labeled, unlabeled]
  # A /triage, /approve, or /revise comment on an issue or pull request.
  issue_comment:
    types: [created]
  # An architecture pull request was closed; the agent runs phase B only when
  # it was merged and the head branch follows the arch/<slug> convention.
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  # Resolve which situation triggered the wrapper and build the aw_context the
  # reusable workflow consumes. A non-match leaves should_run = false so the
  # agent job is skipped.
  #
  # The job-level if: gate skips the route job entirely on issue_comment
  # events whose body does not start with one of the commands this wrapper
  # owns, and on issues label events whose label this wrapper does not route
  # (fixes issue #119 — a /dispatch or /execute comment, or the
  # sdd:in-progress/sdd:dispatched label mutations a /dispatch performs on a
  # tracker, no longer spawn a route-job runner on this wrapper). The route
  # step routes an `issues` event only on `labeled` `sdd:triage` or
  # `unlabeled` `needs-human`; every other label add/remove is skipped here
  # without a runner.
  route:
    if: |
      (github.event_name != 'issue_comment' && github.event_name != 'issues')
      || (
        github.event_name == 'issue_comment'
        && (
          startsWith(github.event.comment.body, '/triage')
          || startsWith(github.event.comment.body, '/approve')
          || startsWith(github.event.comment.body, '/revise')
        )
      )
      || (
        github.event_name == 'issues'
        && (
          (
            github.event.action == 'labeled'
            && github.event.label.name == 'sdd:triage'
          )
          || (
            github.event.action == 'unlabeled'
            && github.event.label.name == 'needs-human'
          )
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      # The route action reads a PR's head ref to gate a /revise to arch PRs.
      pull-requests: read
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      aw_context: ${{ steps.decide.outputs.aw_context }}
      phase: ${{ steps.decide.outputs.phase }}
      target: ${{ steps.decide.outputs.target }}
      item_number: ${{ steps.decide.outputs.item_number }}
    steps:
      - name: Decide whether to run and build aw_context
        id: decide
        uses: norrietaylor/spectacles/.github/actions/sdd-route-triage@main
        with:
          github-token: ${{ github.token }}

  # Per-phase fan-out (issue #271, ADR 0029). The route action resolves a
  # deterministic `target`; exactly one of the three phase jobs runs. The former
  # single sdd-triage mega-workflow is split so each phase loads only its own
  # prompt and only the MCP servers it calls: arch carries Serena + Distillery,
  # plan and materialize carry none.
  #
  # arch: design and persist architecture.md (sdd:triage label, /triage, or
  # /revise on an arch PR). Needs Distillery (DISTILLERY_OAUTH_TOKEN) and the
  # full write ceiling (it opens a PR).
  arch:
    needs: route
    if: needs.route.outputs.should_run == 'true' && needs.route.outputs.target == 'arch'
    uses: norrietaylor/spectacles/.github/workflows/sdd-triage-arch.lock.yml@main
    with:
      aw_context: ${{ needs.route.outputs.aw_context }}
      min_task: ${{ vars.SDD_TRIAGE_MIN_TASK }}
    # Mapped explicitly, not `secrets: inherit`: inherit does not pass secrets
    # to a reusable workflow in a different owner than the caller.
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      # OTLP collector URL (write-only ingest key embedded). Mapped explicitly so
      # the reusable lock's observability.otlp endpoint resolves; unset is fine
      # (if-missing: warn). See ADR 0020.
      GH_AW_OTEL_ENDPOINT: ${{ secrets.GH_AW_OTEL_ENDPOINT }}
      DISTILLERY_OAUTH_TOKEN: ${{ secrets.DISTILLERY_OAUTH_TOKEN }}
    permissions:
      actions: read
      contents: write
      discussions: write
      issues: write
      pull-requests: write

  # plan: post the proposed plan as one comment (arch PR merged, or resume with a
  # plan already posted). No MCP, so no DISTILLERY_OAUTH_TOKEN.
  plan:
    needs: route
    if: needs.route.outputs.should_run == 'true' && needs.route.outputs.target == 'plan'
    uses: norrietaylor/spectacles/.github/workflows/sdd-triage-plan.lock.yml@main
    with:
      aw_context: ${{ needs.route.outputs.aw_context }}
      min_task: ${{ vars.SDD_TRIAGE_MIN_TASK }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_AW_OTEL_ENDPOINT: ${{ secrets.GH_AW_OTEL_ENDPOINT }}
    permissions:
      actions: read
      contents: read
      discussions: write
      issues: write
      pull-requests: read

  # materialize: commit the Unit/task tree and advance to sdd:ready (/approve).
  # No MCP, so no DISTILLERY_OAUTH_TOKEN.
  materialize:
    needs: route
    if: needs.route.outputs.should_run == 'true' && needs.route.outputs.target == 'materialize'
    uses: norrietaylor/spectacles/.github/workflows/sdd-triage-materialize.lock.yml@main
    with:
      aw_context: ${{ needs.route.outputs.aw_context }}
      # Task-bundling diff floor (ADR 0022). Maps the consumer's optional
      # SDD_TRIAGE_MIN_TASK variable into the lock's min_task input.
      min_task: ${{ vars.SDD_TRIAGE_MIN_TASK }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_AW_OTEL_ENDPOINT: ${{ secrets.GH_AW_OTEL_ENDPOINT }}
    permissions:
      actions: read
      contents: read
      discussions: write
      issues: write
      pull-requests: read

  # Deterministic DAG backstop for phase C (ADR 0010, issue #229).
  #
  # The agent's in-prompt cycle check is the PRIMARY guarantee: it upholds
  # zero-create-issue-on-cycle, refusing to materialize a tree whose plan
  # implies a cycle. This job is the AUTHORITATIVE backstop for a cycle that
  # slips past the LLM. It runs AFTER the agent materializes the tree
  # (needs: sdd-triage), walks the Feature -> Unit -> task sub-issues
  # deterministically, and parks the tracking issue with needs-human if a
  # cycle (or an incomplete tree it cannot fully resolve) is found. It gates
  # on phase == 'C' (the /approve materialization) so it never runs on the
  # design or plan-preview phases, which create no task tree to check.
  cycle-detect:
    needs: [route, materialize]
    # always(): the backstop must also run when materialize FAILS partway
    # through, because a partial materialization can leave a cyclic or
    # incomplete tree on the issues — exactly the state the deterministic
    # cycle/tree_incomplete park exists to catch. Gate on route succeeding
    # (so target is a valid value) and on materialize having actually run
    # (result != 'skipped'); only the materialize phase creates a tree.
    if: >-
      always()
      && needs.route.result == 'success'
      && needs.route.outputs.target == 'materialize'
      && needs.materialize.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Detect a dependency cycle in the materialized tree
        id: detect
        uses: norrietaylor/spectacles/.github/actions/sdd-cycle-detect@main
        with:
          tracking-issue: ${{ needs.route.outputs.item_number }}
          github-token: ${{ github.token }}
      # Park the tree only when the detector found a real cycle or could not
      # fully resolve the tree. Mint the App token the same way the other
      # deterministic jobs do (sdd-dispatch's lifecycle/noop jobs) so the
      # label write and comment carry the App identity.
      - name: Mint App token
        id: app
        if: steps.detect.outputs.cycle == 'true' || steps.detect.outputs.tree_incomplete == 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - name: Park the tracking issue with needs-human
        if: steps.detect.outputs.cycle == 'true' || steps.detect.outputs.tree_incomplete == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          APP_TOKEN: ${{ steps.app.outputs.token }}
          TRACKING: ${{ needs.route.outputs.item_number }}
          CYCLE: ${{ steps.detect.outputs.cycle }}
          CYCLE_PATH: ${{ steps.detect.outputs.cycle_path }}
          TREE_INCOMPLETE: ${{ steps.detect.outputs.tree_incomplete }}
        with:
          github-token: ${{ env.APP_TOKEN }}
          script: |
            const tracking = parseInt(process.env.TRACKING, 10);
            const cycle = process.env.CYCLE === 'true';
            const cyclePath = process.env.CYCLE_PATH || '';
            const treeIncomplete = process.env.TREE_INCOMPLETE === 'true';
            let body;
            if (cycle) {
              body = 'Deterministic DAG backstop: the materialized task tree'
                + ' has a dependency cycle (' + cyclePath + '). The agent\'s'
                + ' in-prompt cycle check did not catch it (ADR 0010), so this'
                + ' backstop parked the tracking issue. Break the cycle by'
                + ' editing the `blocked by` lines on the named tasks, then'
                + ' clear `needs-human` to resume triage.';
            } else {
              body = 'Deterministic DAG backstop: a `blocked by` reference on a'
                + ' task points at a number that is neither in the walked'
                + ' Feature -> Unit -> task tree nor a resolvable issue in this'
                + ' repository, so the dependency graph could not be fully'
                + ' verified for cycles. Fix the dangling `blocked by`'
                + ' reference, then clear `needs-human` to resume triage.';
            }
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: tracking,
                labels: ['needs-human'],
              });
            } catch (err) {
              core.info('Could not add needs-human to #' + tracking + ': '
                + err.message);
            }
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: tracking,
                body,
              });
            } catch (err) {
              core.setFailed('Could not post backstop comment on #'
                + tracking + ': ' + err.message);
            }
